<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GameLog — Obsidian</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; font-family: 'Inter', -apple-system, sans-serif; }
  ::-webkit-scrollbar { display: none; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

/* ─── Design Tokens ─── */
const OB = {
  void:    '#000000',
  card:    '#0c0c0c',
  surface: '#111111',
  raised:  '#181818',
  border:  '#1e1e1e',
  borderBr:'#282828',
  text:    '#f0efed',
  textSub: '#5a5a5a',
  textMid: '#888888',
  // Status — used ONLY as tiny 6px dots and label text
  playing: '#4ade80',
  done:    '#facc15',
  want:    '#5b9bd5',
  dnf:     '#3a3a3a',
};

/* ─── Game Data ─── */
const obGAMES = [
  { id:1, title:'Elden Ring',     dev:'FromSoftware',   year:2022, status:'playing',        rating:9.2, playtime:47, sid:1245620, meta:94, genre:'Action RPG',   fb:'linear-gradient(160deg,#3d2a08,#050504)' },
  { id:2, title:'Hollow Knight',  dev:'Team Cherry',    year:2017, status:'done',            rating:9.0, playtime:35, sid:367520,  meta:87, genre:'Metroidvania', fb:'linear-gradient(160deg,#1a1040,#050504)' },
  { id:3, title:"Baldur's Gate 3",dev:'Larian Studios', year:2023, status:'playing',         rating:null,playtime:12, sid:1086940, meta:96, genre:'RPG',          fb:'linear-gradient(160deg,#400d0a,#050504)' },
  { id:4, title:'Hades',          dev:'Supergiant Games',year:2020,status:'done',            rating:8.5, playtime:28, sid:1145360, meta:93, genre:'Roguelite',    fb:'linear-gradient(160deg,#3d0d1f,#050504)' },
  { id:5, title:'Cyberpunk 2077', dev:'CD Projekt Red', year:2020, status:'want_to_play',    rating:null,playtime:0,  sid:1091500, meta:86, genre:'RPG',          fb:'linear-gradient(160deg,#0a1545,#050504)' },
  { id:6, title:'God of War',     dev:'Santa Monica',   year:2018, status:'did_not_finish',  rating:7.0, playtime:8,  sid:1593500, meta:94, genre:'Action',       fb:'linear-gradient(160deg,#3d1508,#050504)' },
];

const obSTATUS = {
  playing:        { label:'Playing',        color: OB.playing },
  done:           { label:'Done',           color: OB.done    },
  want_to_play:   { label:'Want to Play',   color: OB.want    },
  did_not_finish: { label:'Did Not Finish', color: OB.dnf     },
};

/* ─── Cover Image Components ─── */
function PortraitCover({ game, width='100%', height=160, radius=2, position='center top' }) {
  const [err, setErr] = React.useState(false);
  const src = `https://cdn.cloudflare.steamstatic.com/steam/apps/${game.sid}/library_600x900.jpg`;
  return (
    <div style={{ width, height, borderRadius:radius, overflow:'hidden', background:OB.card, flexShrink:0, position:'relative' }}>
      {!err
        ? <img src={src} alt={game.title} onError={() => setErr(true)}
            style={{ width:'100%', height:'100%', objectFit:'cover', objectPosition:position, display:'block' }} />
        : <div style={{ width:'100%', height:'100%', background:game.fb, display:'flex', alignItems:'flex-end', padding:8 }}>
            <span style={{ fontSize:9, fontWeight:600, color:'rgba(255,255,255,0.35)', fontFamily:'Syne,sans-serif' }}>{game.title}</span>
          </div>
      }
    </div>
  );
}

function LandscapeCover({ game, width='100%', height=160 }) {
  const [err, setErr] = React.useState(false);
  const src = `https://cdn.cloudflare.steamstatic.com/steam/apps/${game.sid}/header.jpg`;
  return (
    <div style={{ width, height, overflow:'hidden', background:OB.card, position:'relative', flexShrink:0 }}>
      {!err
        ? <img src={src} alt={game.title} onError={() => setErr(true)}
            style={{ width:'100%', height:'100%', objectFit:'cover', display:'block' }} />
        : <div style={{ width:'100%', height:'100%', background:game.fb }} />
      }
    </div>
  );
}

/* ─── Status Dot ─── */
function Dot({ status, showLabel=false }) {
  const s = obSTATUS[status];
  return (
    <div style={{ display:'flex', alignItems:'center', gap:6 }}>
      <div style={{ width:6, height:6, borderRadius:'50%', background:s.color, flexShrink:0 }} />
      {showLabel && <span style={{ fontSize:10, fontWeight:500, color:OB.textMid, letterSpacing:'0.2px' }}>{s.label}</span>}
    </div>
  );
}

/* ─── HOME SCREEN ─── */
function ObHome() {
  return (
    <div style={{ background:OB.void, minHeight:'100%', paddingBottom:24 }}>

      {/* Greeting */}
      <div style={{ padding:'14px 18px 0' }}>
        <div style={{ fontSize:11, color:OB.textSub, fontWeight:500, letterSpacing:'0.3px', marginBottom:3 }}>Good evening</div>
        <div style={{ fontSize:28, fontWeight:800, color:OB.text, fontFamily:'Syne,sans-serif', lineHeight:1, letterSpacing:'-0.5px' }}>David</div>
      </div>

      {/* Inline stats — no cards, just numbers */}
      <div style={{ padding:'12px 18px 0', display:'flex', gap:20, alignItems:'baseline' }}>
        {[['6','games'],['2','playing'],['122h','logged']].map(([n,l]) => (
          <div key={l} style={{ display:'flex', gap:4, alignItems:'baseline' }}>
            <span style={{ fontSize:18, fontWeight:700, color:OB.text, fontFamily:'Syne,sans-serif', lineHeight:1 }}>{n}</span>
            <span style={{ fontSize:10, color:OB.textSub }}>{l}</span>
          </div>
        ))}
      </div>

      {/* Divider */}
      <div style={{ height:1, background:OB.border, margin:'16px 18px 0' }} />

      {/* Featured game — landscape hero */}
      <div style={{ margin:'16px 18px 0', position:'relative' }}>
        <div style={{ borderRadius:2, overflow:'hidden', position:'relative' }}>
          <LandscapeCover game={obGAMES[0]} height={155} />
          <div style={{ position:'absolute', inset:0, background:'linear-gradient(to top, rgba(0,0,0,0.88) 0%, rgba(0,0,0,0.1) 60%)' }} />
          <div style={{ position:'absolute', bottom:12, left:12, right:12 }}>
            <Dot status={obGAMES[0].status} showLabel />
            <div style={{ marginTop:5, fontSize:16, fontWeight:800, color:OB.text, fontFamily:'Syne,sans-serif', lineHeight:1.15, letterSpacing:'-0.3px' }}>{obGAMES[0].title}</div>
            <div style={{ fontSize:10, color:'rgba(240,239,237,0.4)', marginTop:3 }}>{obGAMES[0].playtime}h played · {obGAMES[0].dev}</div>
          </div>
        </div>
      </div>

      {/* Now Playing */}
      <div style={{ marginTop:24 }}>
        <div style={{ padding:'0 18px', marginBottom:12, display:'flex', justifyContent:'space-between', alignItems:'center' }}>
          <div style={{ fontSize:10, fontWeight:600, color:OB.textSub, letterSpacing:'1.2px', textTransform:'uppercase' }}>Now Playing</div>
          <div style={{ fontSize:10, color:OB.textSub, letterSpacing:'0.3px' }}>see all</div>
        </div>
        <div style={{ display:'flex', gap:12, paddingLeft:18, overflowX:'auto' }}>
          {obGAMES.filter(g => g.status === 'playing').map(g => (
            <div key={g.id} style={{ flexShrink:0, width:96 }}>
              <PortraitCover game={g} width={96} height={130} radius={2} />
              <div style={{ marginTop:7, fontSize:10, fontWeight:600, color:OB.text, lineHeight:1.35 }}>{g.title}</div>
              <div style={{ marginTop:3 }}><Dot status={g.status} /></div>
            </div>
          ))}
          <div style={{ width:18, flexShrink:0 }} />
        </div>
      </div>

      {/* Recent — portrait covers, small */}
      <div style={{ marginTop:22 }}>
        <div style={{ padding:'0 18px', marginBottom:12 }}>
          <div style={{ fontSize:10, fontWeight:600, color:OB.textSub, letterSpacing:'1.2px', textTransform:'uppercase' }}>Recent</div>
        </div>
        <div style={{ display:'flex', gap:10, paddingLeft:18, overflowX:'auto' }}>
          {obGAMES.slice(2, 6).map(g => (
            <div key={g.id} style={{ flexShrink:0, width:80 }}>
              <PortraitCover game={g} width={80} height={107} radius={2} />
              <div style={{ marginTop:6, fontSize:9, fontWeight:600, color:OB.text, lineHeight:1.3 }}>{g.title}</div>
              <div style={{ marginTop:3 }}><Dot status={g.status} /></div>
            </div>
          ))}
          <div style={{ width:18, flexShrink:0 }} />
        </div>
      </div>

      {/* Bottom nav — text only, no icons */}
      <div style={{ margin:'22px 0 0', padding:'11px 18px 0', borderTop:`1px solid ${OB.border}`, display:'flex', justifyContent:'space-between' }}>
        {['Home','Search','Library','Profile'].map((t,i) => (
          <div key={t} style={{
            fontSize:11, fontWeight: i===0 ? 600 : 400,
            color: i===0 ? OB.text : OB.textSub,
            letterSpacing:'0.3px',
          }}>{t}</div>
        ))}
      </div>
    </div>
  );
}

/* ─── LIBRARY SCREEN ─── */
function ObLibrary() {
  const filters = [['All',6],['Playing',2],['Done',2],['Want',1],['DNF',1]];
  return (
    <div style={{ background:OB.void, minHeight:'100%', paddingBottom:80 }}>

      <div style={{ padding:'14px 18px 0' }}>
        <div style={{ fontSize:26, fontWeight:800, color:OB.text, fontFamily:'Syne,sans-serif', letterSpacing:'-0.5px' }}>Library</div>
      </div>

      {/* Text-only filter tabs with underline */}
      <div style={{ display:'flex', gap:0, padding:'14px 18px 0', borderBottom:`1px solid ${OB.border}` }}>
        {filters.map(([f,count],i) => (
          <div key={f} style={{
            paddingBottom:10, paddingRight:16,
            display:'flex', alignItems:'baseline', gap:4,
            borderBottom: i===0 ? `1px solid ${OB.text}` : '1px solid transparent',
            marginBottom:-1,
          }}>
            <span style={{ fontSize:11, fontWeight: i===0 ? 600 : 400, color: i===0 ? OB.text : OB.textSub }}>{f}</span>
            {i===0 && <span style={{ fontSize:9, color:OB.textSub }}>{count}</span>}
          </div>
        ))}
      </div>

      {/* Sort meta */}
      <div style={{ display:'flex', justifyContent:'space-between', padding:'9px 18px' }}>
        <div style={{ fontSize:10, color:OB.textSub }}>6 titles</div>
        <div style={{ fontSize:10, color:OB.textSub }}>Recently added ↓</div>
      </div>

      {/* 2-column grid — real cover images */}
      <div style={{ padding:'0 14px', display:'grid', gridTemplateColumns:'1fr 1fr', gap:14 }}>
        {obGAMES.map(g => {
          const s = obSTATUS[g.status];
          return (
            <div key={g.id} style={{ position:'relative' }}>
              {/* Status stripe — the single colorful element */}
              <div style={{ position:'absolute', left:0, top:0, width:2, height:'calc(100% - 42px)', background:s.color, zIndex:2, borderRadius:'1px 0 0 1px' }} />
              <div style={{ borderRadius:2, overflow:'hidden' }}>
                <PortraitCover game={g} height={153} radius={0} />
              </div>
              <div style={{ padding:'7px 0 0' }}>
                <div style={{ fontSize:11, fontWeight:600, color:OB.text, lineHeight:1.35 }}>{g.title}</div>
                <div style={{ fontSize:9, color:OB.textSub, marginTop:1 }}>{g.dev}</div>
                <div style={{ marginTop:5, display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                  <Dot status={g.status} showLabel />
                  {g.rating && <span style={{ fontSize:11, fontWeight:700, color:OB.text, fontFamily:'Syne,sans-serif', letterSpacing:'-0.2px' }}>{g.rating}</span>}
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ─── DETAIL SCREEN ─── */
function ObDetail() {
  const game = obGAMES[0];
  return (
    <div style={{ background:OB.void, minHeight:'100%' }}>

      {/* Portrait cover — tall, full-width */}
      <div style={{ position:'relative', height:252 }}>
        <PortraitCover game={game} height={252} radius={0} position="center 15%" />
        <div style={{ position:'absolute', inset:0, background:'linear-gradient(to bottom, rgba(0,0,0,0.1) 30%, rgba(0,0,0,0.96) 100%)' }} />
        {/* Back */}
        <div style={{
          position:'absolute', top:14, left:14,
          width:30, height:30, borderRadius:'50%',
          background:'rgba(0,0,0,0.75)', border:`1px solid ${OB.border}`,
          display:'flex', alignItems:'center', justifyContent:'center',
        }}>
          <div style={{ width:0, height:0, borderTop:'4px solid transparent', borderBottom:'4px solid transparent', borderRight:`7px solid ${OB.text}`, marginRight:2 }} />
        </div>
        {/* Text overlay */}
        <div style={{ position:'absolute', bottom:0, left:0, right:0, padding:'0 16px 14px' }}>
          <Dot status={game.status} showLabel />
          <div style={{ marginTop:6, fontSize:21, fontWeight:800, color:OB.text, fontFamily:'Syne,sans-serif', lineHeight:1.15, letterSpacing:'-0.3px' }}>{game.title}</div>
          <div style={{ fontSize:10, color:'rgba(240,239,237,0.4)', marginTop:4 }}>{game.dev} · {game.year} · {game.genre}</div>
        </div>
      </div>

      {/* Stat row */}
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', borderBottom:`1px solid ${OB.border}` }}>
        {[['9.2','Rating'], ['47h','Played'], ['94','MC Score']].map(([v,l], i) => (
          <div key={l} style={{ padding:'12px 0', textAlign:'center', borderRight: i<2 ? `1px solid ${OB.border}` : 'none' }}>
            <div style={{ fontSize:19, fontWeight:800, color:OB.text, fontFamily:'Syne,sans-serif', lineHeight:1, letterSpacing:'-0.3px' }}>{v}</div>
            <div style={{ fontSize:9, color:OB.textSub, marginTop:3, letterSpacing:'0.8px', textTransform:'uppercase' }}>{l}</div>
          </div>
        ))}
      </div>

      {/* Primary action — inverted button (white on black) */}
      <div style={{ padding:'14px 16px 0', display:'flex', gap:8 }}>
        <div style={{ flex:1, background:OB.text, borderRadius:2, padding:'11px 0', textAlign:'center' }}>
          <span style={{ fontSize:12, fontWeight:700, color:OB.void, fontFamily:'Syne,sans-serif', letterSpacing:'0.2px' }}>Update Status</span>
        </div>
        <div style={{ background:OB.surface, borderRadius:2, padding:'11px 16px', border:`1px solid ${OB.border}` }}>
          <span style={{ fontSize:12, fontWeight:500, color:OB.textMid }}>···</span>
        </div>
      </div>

      {/* My Playthrough */}
      <div style={{ margin:'16px 16px 0' }}>
        <div style={{ fontSize:10, fontWeight:600, color:OB.textSub, letterSpacing:'1.2px', textTransform:'uppercase', marginBottom:10 }}>My Playthrough</div>
        {[
          ['Status',   'Playing',      obSTATUS.playing.color],
          ['Playtime', '47 hours',     OB.text],
          ['Rating',   '9.2 / 10',     OB.text],
          ['Started',  'Jan 12, 2024', OB.textMid],
          ['Notes',    'Farum Azula…', OB.textMid],
        ].map(([k,v,c]) => (
          <div key={k} style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'9px 0', borderBottom:`1px solid ${OB.border}` }}>
            <span style={{ fontSize:11, color:OB.textSub }}>{k}</span>
            <span style={{ fontSize:11, fontWeight:500, color:c }}>{v}</span>
          </div>
        ))}
      </div>

      {/* Description */}
      <div style={{ padding:'14px 16px 0', fontSize:12, color:'rgba(240,239,237,0.38)', lineHeight:1.75, fontWeight:400 }}>
        An open-world action RPG set across the Lands Between. Confront demigods, explore ruins, and uncover the mystery of the shattered Elden Ring.
      </div>

      {/* More Like This */}
      <div style={{ padding:'18px 16px 24px' }}>
        <div style={{ fontSize:10, fontWeight:600, color:OB.textSub, letterSpacing:'1.2px', textTransform:'uppercase', marginBottom:12 }}>More Like This</div>
        <div style={{ display:'flex', gap:10, overflowX:'auto' }}>
          {obGAMES.slice(1, 5).map(g => (
            <div key={g.id} style={{ flexShrink:0, width:70 }}>
              <PortraitCover game={g} width={70} height={94} radius={2} />
            </div>
          ))}
          <div style={{ width:16, flexShrink:0 }} />
        </div>
      </div>
    </div>
  );
}

/* ─── Phone Frame ─── */
function ObPhone({ children, label }) {
  return (
    <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:18 }}>
      <div style={{
        width:275, height:596,
        background:'linear-gradient(150deg,#161616,#080808)',
        borderRadius:46, padding:11,
        boxShadow:'0 0 0 1px #1c1c1c, 0 50px 100px rgba(0,0,0,0.98), 0 0 0 8px rgba(255,255,255,0.015)',
        position:'relative',
      }}>
        {/* Side button */}
        <div style={{ position:'absolute', right:-3, top:120, width:3, height:60, background:'#1a1a1a', borderRadius:'0 2px 2px 0' }} />
        <div style={{ position:'absolute', left:-3, top:100, width:3, height:40, background:'#1a1a1a', borderRadius:'2px 0 0 2px' }} />
        <div style={{ position:'absolute', left:-3, top:152, width:3, height:40, background:'#1a1a1a', borderRadius:'2px 0 0 2px' }} />
        <div style={{
          width:'100%', height:'100%',
          background:OB.void, borderRadius:36, overflow:'hidden', position:'relative',
        }}>
          {/* Dynamic Island */}
          <div style={{ position:'absolute', top:10, left:'50%', transform:'translateX(-50%)', width:94, height:28, background:'#000', borderRadius:20, zIndex:10 }} />
          {/* Status bar */}
          <div style={{ position:'absolute', top:0, left:0, right:0, height:50, display:'flex', alignItems:'flex-end', justifyContent:'space-between', paddingBottom:8, paddingLeft:22, paddingRight:22, zIndex:9, pointerEvents:'none' }}>
            <span style={{ fontSize:11, fontWeight:600, color:OB.text, fontFamily:'Syne,sans-serif' }}>9:41</span>
            <div style={{ display:'flex', gap:4, alignItems:'center' }}>
              {/* Signal bars */}
              <svg width="15" height="10" viewBox="0 0 15 10"><rect x="0" y="6" width="2.5" height="4" fill={OB.text} rx="0.4"/><rect x="4" y="4" width="2.5" height="6" fill={OB.text} rx="0.4"/><rect x="8" y="1.5" width="2.5" height="8.5" fill={OB.text} rx="0.4"/><rect x="12" y="0" width="2.5" height="10" fill={OB.text} opacity="0.3" rx="0.4"/></svg>
              {/* Battery */}
              <div style={{ width:22, height:10, border:`1px solid rgba(255,255,255,0.35)`, borderRadius:2.5, padding:'1.5px 2px', display:'flex', alignItems:'center' }}>
                <div style={{ height:'100%', width:'80%', background:OB.text, borderRadius:1 }} />
              </div>
            </div>
          </div>
          {/* Content */}
          <div style={{ position:'absolute', top:50, left:0, right:0, bottom:22, overflowY:'auto', overflowX:'hidden' }}>
            {children}
          </div>
          {/* Home Indicator */}
          <div style={{ position:'absolute', bottom:7, left:'50%', transform:'translateX(-50%)', width:100, height:4, background:'rgba(255,255,255,0.25)', borderRadius:2 }} />
        </div>
      </div>
      {label && (
        <div style={{ fontSize:11, fontWeight:600, color:'#2e2e2e', letterSpacing:'0.15em', textTransform:'uppercase', fontFamily:'Inter,sans-serif' }}>
          {label}
        </div>
      )}
    </div>
  );
}

/* ─── Root App ─── */
function App() {
  return (
    <div style={{
      minHeight:'100vh', background:'#000',
      display:'flex', flexDirection:'column', alignItems:'center',
      padding:'48px 24px 64px', gap:52,
    }}>
      {/* Header */}
      <div style={{ textAlign:'center', maxWidth:640 }}>
        <div style={{
          display:'inline-block',
          background:'#0a0a0a', border:'1px solid #1e1e1e',
          borderRadius:2, padding:'4px 16px', marginBottom:20,
        }}>
          <span style={{ fontSize:10, color:'#444', fontWeight:600, letterSpacing:'1.5px', textTransform:'uppercase', fontFamily:'Inter,sans-serif' }}>
            Design Exploration · 05 of 05
          </span>
        </div>
        <h1 style={{ fontSize:46, fontWeight:800, color:'#f0efed', fontFamily:'Syne,sans-serif', letterSpacing:'-1.5px', lineHeight:1 }}>Obsidian</h1>
        <p style={{ marginTop:14, fontSize:14, color:'#444', fontWeight:400, lineHeight:1.8, maxWidth:480, margin:'14px auto 0', fontFamily:'Inter,sans-serif' }}>
          True black #000000 · Steam game photography as the only color source ·
          Syne ExtraBold display · Monochromatic UI that disappears behind the art
        </p>
      </div>

      {/* Three phones */}
      <div style={{ display:'flex', gap:36, flexWrap:'wrap', justifyContent:'center' }}>
        <ObPhone label="Home"><ObHome /></ObPhone>
        <ObPhone label="Library"><ObLibrary /></ObPhone>
        <ObPhone label="Game Detail"><ObDetail /></ObPhone>
      </div>

      {/* Design principles */}
      <div style={{ maxWidth:860, width:'100%', display:'grid', gridTemplateColumns:'1fr 1fr 1fr 1fr', gap:10 }}>
        {[
          ['#000000',   'AMOLED Black',  'True black — not #0d0d0d or #111. Every pixel is off on OLED screens.'],
          ['Cover Art', 'Only Color',    'Game photography is the sole visual accent. The UI is achromatic.'],
          ['Syne 800',  'Display Type',  'Geometric ExtraBold — confident, distinctive, not generic Inter.'],
          ['2px max',   'Sharp Corners', 'No pills, no 12px cards. Sharp edges signal professionalism.'],
        ].map(([val, name, desc]) => (
          <div key={name} style={{ background:'#080808', border:'1px solid #161616', borderRadius:2, padding:14 }}>
            <div style={{ fontSize:15, fontWeight:800, color:'#f0efed', marginBottom:5, fontFamily:'Syne,sans-serif', letterSpacing:'-0.2px' }}>{val}</div>
            <div style={{ fontSize:11, fontWeight:600, color:'#555', marginBottom:5, letterSpacing:'0.5px', textTransform:'uppercase' }}>{name}</div>
            <div style={{ fontSize:11, color:'#333', lineHeight:1.55 }}>{desc}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>

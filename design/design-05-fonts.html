<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goodgame — Obsidian · Font Variants</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Barlow+Condensed:wght@600;700&family=Barlow:wght@400;500;600&family=Space+Grotesk:wght@400;500;700&family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; }
  ::-webkit-scrollbar { display: none; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

/* ─── Obsidian Tokens (unchanged) ─── */
const OBF = {
  void:    '#000000',
  card:    '#0c0c0c',
  surface: '#111111',
  border:  '#1e1e1e',
  text:    '#f0efed',
  textSub: '#5a5a5a',
  textMid: '#888888',
  playing: '#4ade80',
  done:    '#facc15',
  want:    '#5b9bd5',
  dnf:     '#3a3a3a',
};

/* ─── Font Variants ─── */
const fontVariants = [
  {
    id: 'playfair',
    name: 'Playfair Display',
    note: 'Luxury editorial serif',
    display: '"Playfair Display", Georgia, serif',
    body: 'Inter, -apple-system, sans-serif',
    displayWeight: 700,
    letterSpacing: '-0.2px',
    nameSize: 28,
    heroTitleSize: 17,
    gameTitleSize: 10,
    navWeight: 600,
  },
  {
    id: 'barlow',
    name: 'Barlow Condensed',
    note: 'Cinematic condensed',
    display: '"Barlow Condensed", "Arial Narrow", sans-serif',
    body: 'Barlow, Inter, -apple-system, sans-serif',
    displayWeight: 700,
    letterSpacing: '0.5px',
    nameSize: 34,
    heroTitleSize: 20,
    gameTitleSize: 11,
    navWeight: 600,
  },
  {
    id: 'grotesk',
    name: 'Space Grotesk',
    note: 'Engineered geometric',
    display: '"Space Grotesk", Inter, sans-serif',
    body: '"Space Grotesk", Inter, sans-serif',
    displayWeight: 700,
    letterSpacing: '-0.4px',
    nameSize: 26,
    heroTitleSize: 16,
    gameTitleSize: 10,
    navWeight: 500,
  },
  {
    id: 'cormorant',
    name: 'Cormorant Garamond',
    note: 'High-contrast luxury serif',
    display: '"Cormorant Garamond", "Garamond", Georgia, serif',
    body: 'Inter, -apple-system, sans-serif',
    displayWeight: 700,
    letterSpacing: '0.3px',
    nameSize: 32,
    heroTitleSize: 20,
    gameTitleSize: 10,
    navWeight: 600,
  },
];

/* ─── Game Data ─── */
const fGAMES = [
  { id:1, title:'Elden Ring',     dev:'FromSoftware',   year:2022, status:'playing',        rating:9.2, playtime:47, sid:1245620, genre:'Action RPG', fb:'linear-gradient(160deg,#3d2a08,#050504)' },
  { id:2, title:'Hollow Knight',  dev:'Team Cherry',    year:2017, status:'done',            rating:9.0, playtime:35, sid:367520,  genre:'Metroidvania',fb:'linear-gradient(160deg,#1a1040,#050504)' },
  { id:3, title:"Baldur's Gate 3",dev:'Larian Studios', year:2023, status:'playing',         rating:null,playtime:12, sid:1086940, genre:'RPG',         fb:'linear-gradient(160deg,#400d0a,#050504)' },
  { id:4, title:'Hades',          dev:'Supergiant',     year:2020, status:'done',            rating:8.5, playtime:28, sid:1145360, genre:'Roguelite',   fb:'linear-gradient(160deg,#3d0d1f,#050504)' },
  { id:5, title:'Cyberpunk 2077', dev:'CD Projekt Red', year:2020, status:'want_to_play',    rating:null,playtime:0,  sid:1091500, genre:'RPG',         fb:'linear-gradient(160deg,#0a1545,#050504)' },
  { id:6, title:'God of War',     dev:'Santa Monica',   year:2018, status:'did_not_finish',  rating:7.0, playtime:8,  sid:1593500, genre:'Action',      fb:'linear-gradient(160deg,#3d1508,#050504)' },
];

const fSTATUS = {
  playing:        { label:'Playing',        color: OBF.playing },
  done:           { label:'Done',           color: OBF.done    },
  want_to_play:   { label:'Want to Play',   color: OBF.want    },
  did_not_finish: { label:'Did Not Finish', color: OBF.dnf     },
};

/* ─── Shared Components ─── */
function FPortraitCover({ game, width='100%', height=130, radius=2 }) {
  const [err, setErr] = React.useState(false);
  const src = `https://cdn.cloudflare.steamstatic.com/steam/apps/${game.sid}/library_600x900.jpg`;
  return (
    <div style={{ width, height, borderRadius:radius, overflow:'hidden', background:OBF.card, flexShrink:0, position:'relative' }}>
      {!err
        ? <img src={src} alt={game.title} onError={() => setErr(true)} style={{ width:'100%', height:'100%', objectFit:'cover', objectPosition:'center top', display:'block' }} />
        : <div style={{ width:'100%', height:'100%', background:game.fb }} />
      }
    </div>
  );
}

function FLandscapeCover({ game, height=150 }) {
  const [err, setErr] = React.useState(false);
  const src = `https://cdn.cloudflare.steamstatic.com/steam/apps/${game.sid}/header.jpg`;
  return (
    <div style={{ width:'100%', height, overflow:'hidden', background:OBF.card, position:'relative' }}>
      {!err
        ? <img src={src} alt={game.title} onError={() => setErr(true)} style={{ width:'100%', height:'100%', objectFit:'cover', display:'block' }} />
        : <div style={{ width:'100%', height:'100%', background:game.fb }} />
      }
    </div>
  );
}

function FDot({ status }) {
  const s = fSTATUS[status];
  return (
    <div style={{ display:'flex', alignItems:'center', gap:5 }}>
      <div style={{ width:5, height:5, borderRadius:'50%', background:s.color, flexShrink:0 }} />
      <span style={{ fontSize:9, fontWeight:500, color:OBF.textMid }}>{s.label}</span>
    </div>
  );
}

/* ─── Home Screen — font-aware ─── */
function FontHome({ f }) {
  return (
    <div style={{ background:OBF.void, minHeight:'100%', paddingBottom:20 }}>

      {/* Greeting */}
      <div style={{ padding:'14px 16px 0' }}>
        <div style={{ fontSize:10, color:OBF.textSub, fontWeight:500, letterSpacing:'0.3px', marginBottom:3, fontFamily:f.body }}>Good evening</div>
        <div style={{ fontSize:f.nameSize, fontWeight:f.displayWeight, color:OBF.text, fontFamily:f.display, lineHeight:1.05, letterSpacing:f.letterSpacing }}>David</div>
      </div>

      {/* Stats — plain inline */}
      <div style={{ padding:'10px 16px 0', display:'flex', gap:18, alignItems:'baseline' }}>
        {[['6','games'],['2','playing'],['122h','logged']].map(([n,l]) => (
          <div key={l} style={{ display:'flex', gap:3, alignItems:'baseline' }}>
            <span style={{ fontSize:16, fontWeight:f.displayWeight, color:OBF.text, fontFamily:f.display, lineHeight:1, letterSpacing:f.letterSpacing }}>{n}</span>
            <span style={{ fontSize:9, color:OBF.textSub, fontFamily:f.body }}>{l}</span>
          </div>
        ))}
      </div>

      <div style={{ height:1, background:OBF.border, margin:'14px 16px 0' }} />

      {/* Featured — landscape cover */}
      <div style={{ margin:'14px 16px 0', borderRadius:2, overflow:'hidden', position:'relative' }}>
        <FLandscapeCover game={fGAMES[0]} height={145} />
        <div style={{ position:'absolute', inset:0, background:'linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.05) 55%)' }} />
        <div style={{ position:'absolute', bottom:11, left:11, right:11 }}>
          <FDot status={fGAMES[0].status} />
          <div style={{ marginTop:5, fontSize:f.heroTitleSize, fontWeight:f.displayWeight, color:OBF.text, fontFamily:f.display, lineHeight:1.2, letterSpacing:f.letterSpacing }}>{fGAMES[0].title}</div>
          <div style={{ fontSize:9, color:'rgba(240,239,237,0.4)', marginTop:3, fontFamily:f.body }}>{fGAMES[0].playtime}h · {fGAMES[0].dev}</div>
        </div>
      </div>

      {/* Now Playing */}
      <div style={{ marginTop:20 }}>
        <div style={{ padding:'0 16px', marginBottom:10, display:'flex', justifyContent:'space-between' }}>
          <div style={{ fontSize:9, fontWeight:600, color:OBF.textSub, letterSpacing:'1.2px', textTransform:'uppercase', fontFamily:f.body }}>Now Playing</div>
          <div style={{ fontSize:9, color:OBF.textSub, fontFamily:f.body }}>see all</div>
        </div>
        <div style={{ display:'flex', gap:10, paddingLeft:16, overflowX:'auto' }}>
          {fGAMES.filter(g => g.status === 'playing').map(g => (
            <div key={g.id} style={{ flexShrink:0, width:88 }}>
              <FPortraitCover game={g} width={88} height={118} radius={2} />
              <div style={{ marginTop:6, fontSize:f.gameTitleSize, fontWeight:f.navWeight, color:OBF.text, lineHeight:1.35, fontFamily:f.display, letterSpacing:f.letterSpacing }}>{g.title}</div>
              <div style={{ marginTop:3 }}><FDot status={g.status} /></div>
            </div>
          ))}
          <div style={{ width:16, flexShrink:0 }} />
        </div>
      </div>

      {/* Library scroll */}
      <div style={{ marginTop:18 }}>
        <div style={{ padding:'0 16px', marginBottom:10 }}>
          <div style={{ fontSize:9, fontWeight:600, color:OBF.textSub, letterSpacing:'1.2px', textTransform:'uppercase', fontFamily:f.body }}>Recent</div>
        </div>
        <div style={{ display:'flex', gap:8, paddingLeft:16, overflowX:'auto' }}>
          {fGAMES.slice(2).map(g => (
            <div key={g.id} style={{ flexShrink:0, width:72 }}>
              <FPortraitCover game={g} width={72} height={97} radius={2} />
              <div style={{ marginTop:5, fontSize:9, fontWeight:f.navWeight, color:OBF.text, lineHeight:1.3, fontFamily:f.display, letterSpacing:f.letterSpacing }}>{g.title}</div>
              <div style={{ marginTop:3 }}><FDot status={g.status} /></div>
            </div>
          ))}
          <div style={{ width:16, flexShrink:0 }} />
        </div>
      </div>

      {/* Nav — text only */}
      <div style={{ margin:'20px 0 0', padding:'10px 16px 0', borderTop:`1px solid ${OBF.border}`, display:'flex', justifyContent:'space-between' }}>
        {['Home','Search','Library','Profile'].map((t,i) => (
          <div key={t} style={{ fontSize:10, fontWeight: i===0 ? f.navWeight : 400, color: i===0 ? OBF.text : OBF.textSub, fontFamily:f.body, letterSpacing:'0.2px' }}>{t}</div>
        ))}
      </div>
    </div>
  );
}

/* ─── Phone Frame ─── */
function FPhone({ children, label, accent }) {
  return (
    <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:16 }}>
      <div style={{
        width:268, height:582,
        background:'linear-gradient(150deg,#161616,#080808)',
        borderRadius:46, padding:10,
        boxShadow:`0 0 0 1px #1c1c1c, 0 50px 100px rgba(0,0,0,0.98)`,
        position:'relative',
      }}>
        <div style={{ position:'absolute', right:-3, top:118, width:3, height:58, background:'#1a1a1a', borderRadius:'0 2px 2px 0' }} />
        <div style={{ position:'absolute', left:-3, top:98, width:3, height:38, background:'#1a1a1a', borderRadius:'2px 0 0 2px' }} />
        <div style={{ position:'absolute', left:-3, top:148, width:3, height:38, background:'#1a1a1a', borderRadius:'2px 0 0 2px' }} />
        <div style={{ width:'100%', height:'100%', background:OBF.void, borderRadius:36, overflow:'hidden', position:'relative' }}>
          <div style={{ position:'absolute', top:10, left:'50%', transform:'translateX(-50%)', width:90, height:27, background:'#000', borderRadius:20, zIndex:10 }} />
          <div style={{ position:'absolute', top:0, left:0, right:0, height:48, display:'flex', alignItems:'flex-end', justifyContent:'space-between', paddingBottom:7, paddingLeft:21, paddingRight:21, zIndex:9, pointerEvents:'none' }}>
            <span style={{ fontSize:11, fontWeight:600, color:OBF.text }}>9:41</span>
            <div style={{ display:'flex', gap:4, alignItems:'center' }}>
              <svg width="15" height="10" viewBox="0 0 15 10"><rect x="0" y="6" width="2.5" height="4" fill={OBF.text} rx="0.4"/><rect x="4" y="4" width="2.5" height="6" fill={OBF.text} rx="0.4"/><rect x="8" y="1.5" width="2.5" height="8.5" fill={OBF.text} rx="0.4"/><rect x="12" y="0" width="2.5" height="10" fill={OBF.text} opacity="0.3" rx="0.4"/></svg>
              <div style={{ width:21, height:10, border:'1px solid rgba(255,255,255,0.35)', borderRadius:2.5, padding:'1.5px 2px', display:'flex', alignItems:'center' }}>
                <div style={{ height:'100%', width:'80%', background:OBF.text, borderRadius:1 }} />
              </div>
            </div>
          </div>
          <div style={{ position:'absolute', top:48, left:0, right:0, bottom:20, overflowY:'auto', overflowX:'hidden' }}>
            {children}
          </div>
          <div style={{ position:'absolute', bottom:6, left:'50%', transform:'translateX(-50%)', width:96, height:4, background:'rgba(255,255,255,0.22)', borderRadius:2 }} />
        </div>
      </div>

      {/* Label block */}
      <div style={{ textAlign:'center' }}>
        <div style={{ fontSize:13, fontWeight:700, color:'#d0cfcd', fontFamily:label.display, letterSpacing:label.letterSpacing }}>{label.name}</div>
        <div style={{ fontSize:10, color:'#333', marginTop:3, fontFamily:'Inter,sans-serif' }}>{label.note}</div>
      </div>
    </div>
  );
}

/* ─── Root App ─── */
function App() {
  return (
    <div style={{ minHeight:'100vh', background:'#000', display:'flex', flexDirection:'column', alignItems:'center', padding:'48px 24px 64px', gap:48 }}>

      {/* Page header */}
      <div style={{ textAlign:'center', maxWidth:640 }}>
        <div style={{ display:'inline-block', background:'#0a0a0a', border:'1px solid #1e1e1e', borderRadius:2, padding:'4px 16px', marginBottom:20 }}>
          <span style={{ fontSize:10, color:'#444', fontWeight:600, letterSpacing:'1.5px', textTransform:'uppercase', fontFamily:'Inter,sans-serif' }}>Obsidian · Font Exploration</span>
        </div>
        <h1 style={{ fontSize:38, fontWeight:700, color:'#f0efed', fontFamily:'Inter,sans-serif', letterSpacing:'-1px', lineHeight:1.1 }}>
          4 Font Pairings
        </h1>
        <p style={{ marginTop:12, fontSize:14, color:'#444', lineHeight:1.75, maxWidth:460, margin:'12px auto 0', fontFamily:'Inter,sans-serif' }}>
          Same design system, same layout. Only the typefaces change.
          Pick a direction or mix display from one with body from another.
        </p>
      </div>

      {/* Font comparison — 4 phones */}
      <div style={{ display:'flex', gap:28, flexWrap:'wrap', justifyContent:'center', alignItems:'flex-start' }}>
        {fontVariants.map(f => (
          <FPhone key={f.id} label={f}>
            <FontHome f={f} />
          </FPhone>
        ))}
      </div>

      {/* Comparison table */}
      <div style={{ maxWidth:900, width:'100%' }}>
        <div style={{ height:1, background:'#111', marginBottom:32 }} />
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr 1fr', gap:12 }}>
          {fontVariants.map(f => (
            <div key={f.id} style={{ background:'#080808', border:'1px solid #161616', borderRadius:2, padding:16 }}>
              {/* Font name in its own face */}
              <div style={{ fontSize:22, fontWeight:f.displayWeight, color:'#f0efed', fontFamily:f.display, letterSpacing:f.letterSpacing, lineHeight:1.2, marginBottom:6 }}>Aa</div>
              <div style={{ fontSize:12, fontWeight:600, color:'#f0efed', fontFamily:f.display, letterSpacing:f.letterSpacing, marginBottom:3 }}>{f.name}</div>
              <div style={{ fontSize:10, color:'#555', marginBottom:10, fontFamily:'Inter,sans-serif' }}>{f.note}</div>
              <div style={{ height:1, background:'#1a1a1a', marginBottom:10 }} />
              {/* Sample text in this font */}
              <div style={{ fontSize:10, color:'#666', lineHeight:1.7, fontFamily:'Inter,sans-serif' }}>
                Display: <span style={{ fontFamily:f.display, fontWeight:f.displayWeight, color:'#888', letterSpacing:f.letterSpacing }}>heading</span><br/>
                Body: <span style={{ fontFamily:f.body, color:'#888' }}>paragraph text</span>
              </div>
            </div>
          ))}
        </div>

        {/* Mixing note */}
        <div style={{ marginTop:24, padding:'16px 20px', background:'#080808', border:'1px solid #161616', borderRadius:2 }}>
          <div style={{ fontSize:10, fontWeight:600, color:'#555', letterSpacing:'1px', textTransform:'uppercase', marginBottom:8, fontFamily:'Inter,sans-serif' }}>Good combinations to consider</div>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:10 }}>
            {[
              ['Playfair Display', '×', 'Inter body', 'Most editorial — headlines feel cinematic, body stays invisible'],
              ['Barlow Condensed', '×', 'Inter body', 'Poster energy — game titles feel like film title cards'],
              ['Cormorant Garamond', '×', 'Inter body', 'Ultra-luxury — fashion-editorial, game titles feel premium'],
            ].map(([a,x,b,desc]) => (
              <div key={a} style={{ padding:'10px 12px', background:'#0d0d0d', border:'1px solid #1a1a1a', borderRadius:2 }}>
                <div style={{ fontSize:11, fontWeight:600, color:'#888', marginBottom:4, fontFamily:'Inter,sans-serif' }}>
                  <span style={{ color:'#f0efed' }}>{a}</span> {x} <span style={{ color:'#f0efed' }}>{b}</span>
                </div>
                <div style={{ fontSize:10, color:'#444', lineHeight:1.5, fontFamily:'Inter,sans-serif' }}>{desc}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>

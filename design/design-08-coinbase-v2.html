<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goodgame — Coinbase Design v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0b0d; }
::-webkit-scrollbar { display: none; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

/* ── Design Tokens — faithful to DESIGN.md ── */
const T = {
  primary:         '#0052ff',
  ink:             '#0a0b0d',
  body:            '#5b616e',
  muted:           '#7c828a',
  mutedSoft:       '#a8acb3',
  hairline:        '#dee1e6',
  hairlineSoft:    '#eef0f3',
  canvas:          '#ffffff',
  surfaceSoft:     '#f7f7f7',
  surfaceStrong:   '#eef0f3',
  surfaceDark:     '#0a0b0d',
  surfaceDarkElev: '#16181c',
  onDark:          '#ffffff',
  onDarkSoft:      '#a8acb3',
  up:              '#05b169',
  down:            '#cf202f',
  yellow:          '#f4b000',
};

const F = "Inter, -apple-system, system-ui, 'Segoe UI', sans-serif";
const MONO = '"JetBrains Mono", monospace';

const STATUS_MAP = {
  playing:        { label: 'Playing',        color: T.up },
  done:           { label: 'Done',           color: T.yellow },
  want_to_play:   { label: 'Want to Play',   color: T.mutedSoft },
  did_not_finish: { label: 'Did Not Finish', color: T.muted },
};

const GAMES = [
  { id:1, title:'Elden Ring',       dev:'FromSoftware',   year:2022, sid:1245620, status:'playing',        rating:9.5,  time:87,  meta:96 },
  { id:2, title:"Baldur's Gate 3",  dev:'Larian Studios', year:2023, sid:1086940, status:'done',           rating:10.0, time:124, meta:96 },
  { id:3, title:'Hades',            dev:'Supergiant',     year:2020, sid:1145360, status:'done',           rating:9.0,  time:52,  meta:93 },
  { id:4, title:'Hollow Knight',    dev:'Team Cherry',    year:2017, sid:367520,  status:'did_not_finish', rating:7.0,  time:18,  meta:87 },
  { id:5, title:'Cyberpunk 2077',   dev:'CD Projekt Red', year:2020, sid:1091500, status:'want_to_play',   rating:null, time:0,   meta:86 },
  { id:6, title:'God of War',       dev:'Santa Monica',   year:2018, sid:1593500, status:'done',           rating:9.2,  time:34,  meta:94 },
];

/* ── IosFrame (inlined from assets/ios_frame.jsx) ── */
const iosSt = {
  wrap:   { display:'inline-block', padding:12, background:'#000', borderRadius:60, boxShadow:'0 0 0 2px #1f2937, 0 24px 64px rgba(0,0,0,0.4)' },
  screen: { position:'relative', borderRadius:48, overflow:'hidden' },
  bar:    { position:'absolute', top:0, left:0, right:0, height:54, display:'flex', alignItems:'center', justifyContent:'space-between', padding:'0 32px', fontSize:15, fontWeight:600, fontFamily:'-apple-system,"SF Pro Text",sans-serif', zIndex:20, pointerEvents:'none' },
  island: { position:'absolute', top:12, left:'50%', transform:'translateX(-50%)', width:124, height:36, background:'#000', borderRadius:999, zIndex:30 },
  content:{ position:'absolute', top:54, left:0, right:0, bottom:34, overflow:'auto' },
  home:   { position:'absolute', bottom:10, left:'50%', transform:'translateX(-50%)', width:140, height:5, borderRadius:999, zIndex:10 },
};

function IosFrame({ children, width=375, height=812, time='9:41', battery=82, darkMode=false }) {
  const c = darkMode ? '#fff' : '#000';
  return (
    <div style={iosSt.wrap}>
      <div style={{ ...iosSt.screen, width, height, background: darkMode ? '#000' : '#fff' }}>
        <div style={{ ...iosSt.bar, color:c }}>
          <span>{time}</span>
          <div style={{ display:'flex', alignItems:'center', gap:6 }}>
            <div style={{ display:'flex', alignItems:'flex-end', gap:2, height:12 }}>
              {[4,6,9,11].map(h => <div key={h} style={{ width:3, height:h, background:'currentColor', borderRadius:1 }} />)}
            </div>
            <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
              <path d="M8 11.5a1 1 0 100-2 1 1 0 000 2z" fill={c}/>
              <path d="M3 7.5a7 7 0 0110 0" stroke={c} strokeWidth="1.3" fill="none" strokeLinecap="round"/>
              <path d="M1 4.5a11 11 0 0114 0" stroke={c} strokeWidth="1.3" fill="none" strokeLinecap="round" opacity="0.7"/>
            </svg>
            <div style={{ width:26, height:12, border:`1.5px solid ${c}`, borderRadius:3, padding:1, opacity:0.8 }}>
              <div style={{ width:`${battery}%`, height:'100%', background:c, borderRadius:1 }}/>
            </div>
          </div>
        </div>
        <div style={iosSt.island}/>
        <div style={iosSt.content}>{children}</div>
        <div style={{ ...iosSt.home, background: darkMode ? 'rgba(255,255,255,0.5)' : 'rgba(0,0,0,0.3)' }}/>
      </div>
    </div>
  );
}

/* ── Shared Components ── */

function Cover({ game, w=38, h=50, r=8 }) {
  const [err, setErr] = React.useState(false);
  return (
    <div style={{ width:w, height:h, borderRadius:r, overflow:'hidden', flexShrink:0, background:T.surfaceStrong }}>
      {!err
        ? <img src={`https://cdn.cloudflare.steamstatic.com/steam/apps/${game.sid}/library_600x900.jpg`}
            onError={() => setErr(true)} alt={game.title}
            style={{ width:'100%', height:'100%', objectFit:'cover', objectPosition:'center top', display:'block' }}/>
        : <div style={{ width:'100%', height:'100%', background:'#1a1a2e' }}/>
      }
    </div>
  );
}

function BannerCover({ game, height=128 }) {
  const [err, setErr] = React.useState(false);
  return (
    <div style={{ width:'100%', height, overflow:'hidden', background:T.surfaceDark, flexShrink:0 }}>
      {!err
        ? <img src={`https://cdn.cloudflare.steamstatic.com/steam/apps/${game.sid}/header.jpg`}
            onError={() => setErr(true)} alt={game.title}
            style={{ width:'100%', height:'100%', objectFit:'cover', display:'block' }}/>
        : <div style={{ width:'100%', height:'100%', background:'linear-gradient(135deg,#1a1a2e,#0a0b0d)' }}/>
      }
    </div>
  );
}

function Num({ v, size=14, color=T.ink, w=500 }) {
  return <span style={{ fontFamily:MONO, fontSize:size, fontWeight:w, color, letterSpacing:'-0.3px' }}>{v}</span>;
}

function Label({ children }) {
  return <div style={{ color:T.muted, fontSize:11, fontFamily:F, fontWeight:500, letterSpacing:'0.5px', textTransform:'uppercase', marginBottom:10 }}>{children}</div>;
}

function Chevron() {
  return <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke={T.mutedSoft} strokeWidth="2" strokeLinecap="round"><path d="m9 18 6-6-6-6"/></svg>;
}

const IcHome = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>;
const IcGrid = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>;
const IcSearch = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>;
const IcUser = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><circle cx="12" cy="8" r="4"/><path d="M6 20v-2a6 6 0 0 1 12 0v2"/></svg>;

function TabBar({ active }) {
  const tabs = [
    { id:'home',    label:'Home',    Icon:IcHome },
    { id:'library', label:'Library', Icon:IcGrid },
    { id:'discover',label:'Discover',Icon:IcSearch },
    { id:'profile', label:'Profile', Icon:IcUser },
  ];
  return (
    <div style={{ height:56, background:T.canvas, borderTop:`1px solid ${T.hairline}`, display:'flex', alignItems:'flex-start', paddingTop:7, flexShrink:0 }}>
      {tabs.map(({ id, label, Icon }) => (
        <div key={id} style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:3, color:id===active?T.primary:T.mutedSoft }}>
          <Icon/>
          <span style={{ fontSize:10, fontFamily:F, fontWeight:500 }}>{label}</span>
        </div>
      ))}
    </div>
  );
}

function SearchPill({ placeholder }) {
  return (
    <div style={{ background:T.surfaceStrong, borderRadius:100, padding:'10px 16px', display:'flex', alignItems:'center', gap:8 }}>
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke={T.muted} strokeWidth="2.5" strokeLinecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <span style={{ color:T.muted, fontSize:13, fontFamily:F }}>{placeholder}</span>
    </div>
  );
}

function FilterPills({ items, activeIdx=0 }) {
  return (
    <div style={{ display:'flex', gap:6, overflowX:'auto' }}>
      {items.map((f,i) => (
        <div key={f} style={{ background:i===activeIdx?T.ink:T.surfaceStrong, color:i===activeIdx?T.canvas:T.body, borderRadius:100, padding:'5px 12px', fontSize:12, fontFamily:F, fontWeight:600, whiteSpace:'nowrap', flexShrink:0 }}>{f}</div>
      ))}
    </div>
  );
}

/* ── Screen 1: Home ── */
function HomeScreen() {
  const inProgress = GAMES.filter(g => g.status === 'playing');
  const done = GAMES.filter(g => g.status === 'done');
  return (
    <div style={{ height:'100%', display:'flex', flexDirection:'column', background:T.canvas }}>
      <div style={{ flex:1, overflowY:'auto' }}>

        {/* Dark portfolio hero band — the defining Coinbase move on mobile */}
        <div style={{ background:T.surfaceDark, padding:'18px 16px 22px' }}>
          <div style={{ color:T.onDarkSoft, fontSize:11, fontFamily:F, fontWeight:500, letterSpacing:'0.5px', textTransform:'uppercase', marginBottom:7 }}>Your library</div>
          {/* Weight 400 on large display — institutional calm */}
          <div style={{ color:T.onDark, fontSize:36, fontFamily:F, fontWeight:400, letterSpacing:'-1.5px', lineHeight:1.0, marginBottom:18 }}>47 games</div>
          <div style={{ display:'flex', gap:8 }}>
            {[['342h','played'],['23','completed'],['3','playing']].map(([val,lbl]) => (
              <div key={lbl} style={{ background:T.surfaceDarkElev, borderRadius:12, padding:'8px 12px', flex:1 }}>
                <Num v={val} size={15} color={T.onDark} w={400}/>
                <div style={{ color:T.onDarkSoft, fontSize:10, fontFamily:F, marginTop:2 }}>{lbl}</div>
              </div>
            ))}
          </div>
        </div>

        {/* In Progress */}
        <div style={{ padding:'18px 16px 0' }}>
          <Label>In progress</Label>
          {inProgress.map(g => (
            <div key={g.id} style={{ borderRadius:20, overflow:'hidden', border:`1px solid ${T.hairline}`, marginBottom:10 }}>
              <div style={{ position:'relative', height:120 }}>
                <BannerCover game={g} height={120}/>
                <div style={{ position:'absolute', inset:0, background:'linear-gradient(to bottom, transparent 15%, rgba(10,11,13,0.93) 82%)' }}/>
                <div style={{ position:'absolute', bottom:0, left:0, right:0, padding:'10px 13px', display:'flex', justifyContent:'space-between', alignItems:'flex-end' }}>
                  <div>
                    <div style={{ color:T.onDark, fontSize:13, fontFamily:F, fontWeight:500, letterSpacing:'-0.2px', marginBottom:4 }}>{g.title}</div>
                    <div style={{ display:'flex', alignItems:'center', gap:4 }}>
                      <div style={{ width:6, height:6, borderRadius:9999, background:T.up }}/>
                      <span style={{ color:T.up, fontSize:10, fontFamily:F, fontWeight:600 }}>Playing</span>
                    </div>
                  </div>
                  <Num v={`${g.time}h`} size={11} color={T.onDarkSoft}/>
                </div>
              </div>
            </div>
          ))}
        </div>

        {/* Recent completions */}
        <div style={{ padding:'14px 16px 20px' }}>
          <Label>Recent completions</Label>
          <div style={{ background:T.canvas, borderRadius:20, border:`1px solid ${T.hairline}`, overflow:'hidden' }}>
            {done.slice(0,3).map((g,i,arr) => (
              <div key={g.id} style={{ padding:'11px 12px', display:'flex', alignItems:'center', gap:10, borderBottom:i<arr.length-1?`1px solid ${T.hairlineSoft}`:'none' }}>
                <Cover game={g} w={32} h={42} r={6}/>
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ color:T.ink, fontSize:13, fontFamily:F, fontWeight:500, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', letterSpacing:'-0.1px' }}>{g.title}</div>
                  <div style={{ color:T.body, fontSize:11, fontFamily:F, marginTop:1 }}>{g.time}h played</div>
                </div>
                <Num v={g.rating?.toFixed(1)} size={13} color={T.yellow}/>
                <Chevron/>
              </div>
            ))}
          </div>
        </div>

      </div>
      <TabBar active="home"/>
    </div>
  );
}

/* ── Screen 2: Library ── */
function LibraryScreen() {
  return (
    <div style={{ height:'100%', display:'flex', flexDirection:'column', background:T.canvas }}>
      <div style={{ flex:1, overflowY:'auto' }}>

        <div style={{ padding:'16px 16px 8px', display:'flex', justifyContent:'space-between', alignItems:'baseline' }}>
          <div style={{ color:T.ink, fontSize:28, fontFamily:F, fontWeight:400, letterSpacing:'-0.8px' }}>Library</div>
          <span style={{ color:T.primary, fontSize:13, fontFamily:F, fontWeight:600 }}>Sort</span>
        </div>

        <div style={{ padding:'0 16px 10px' }}><SearchPill placeholder="Search…"/></div>

        <div style={{ padding:'0 16px 14px' }}>
          <FilterPills items={['All','Playing','Done','Backlog','Dropped']}/>
        </div>

        <div style={{ padding:'0 16px' }}>
          <div style={{ background:T.canvas, borderRadius:20, border:`1px solid ${T.hairline}`, overflow:'hidden' }}>
            {GAMES.map((g,i) => {
              const s = STATUS_MAP[g.status];
              return (
                <div key={g.id} style={{ padding:'10px 12px', display:'flex', alignItems:'center', gap:10, borderBottom:i<GAMES.length-1?`1px solid ${T.hairlineSoft}`:'none' }}>
                  <Cover game={g} w={34} h={46} r={7}/>
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ color:T.ink, fontSize:13, fontFamily:F, fontWeight:500, letterSpacing:'-0.1px', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{g.title}</div>
                    <span style={{ color:s.color, fontSize:11, fontFamily:F, fontWeight:600 }}>{s.label}</span>
                  </div>
                  <div style={{ textAlign:'right', flexShrink:0 }}>
                    {g.rating
                      ? <Num v={g.rating.toFixed(1)} size={13} color={T.ink}/>
                      : <span style={{ color:T.muted, fontSize:11, fontFamily:F }}>—</span>
                    }
                    <div style={{ color:T.muted, fontSize:10, fontFamily:F, marginTop:1 }}>{g.time>0?`${g.time}h`:'—'}</div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>

      </div>
      <TabBar active="library"/>
    </div>
  );
}

/* ── Screen 3: Detail ── */
function DetailScreen() {
  const g = GAMES[0];
  return (
    <div style={{ height:'100%', display:'flex', flexDirection:'column' }}>

      {/* Full dark hero — product-ui-card-dark pattern */}
      <div style={{ background:T.surfaceDark, flexShrink:0 }}>
        <div style={{ position:'relative', height:200 }}>
          <BannerCover game={g} height={200}/>
          <div style={{ position:'absolute', inset:0, background:'linear-gradient(to bottom, rgba(10,11,13,0.15) 0%, transparent 25%, rgba(10,11,13,0.88) 68%, #0a0b0d 100%)' }}/>
        </div>
        <div style={{ padding:'0 16px 18px' }}>
          <div style={{ color:T.onDark, fontSize:22, fontFamily:F, fontWeight:400, letterSpacing:'-0.8px', lineHeight:1.1, marginBottom:8 }}>{g.title}</div>
          <div style={{ display:'flex', alignItems:'center', gap:8 }}>
            <div style={{ display:'flex', alignItems:'center', gap:4 }}>
              <div style={{ width:7, height:7, borderRadius:9999, background:T.up }}/>
              <span style={{ color:T.up, fontSize:11, fontFamily:F, fontWeight:600 }}>Playing</span>
            </div>
            <span style={{ color:'#2a2f38' }}>·</span>
            <span style={{ color:T.onDarkSoft, fontSize:11, fontFamily:F }}>{g.dev}</span>
          </div>
        </div>
      </div>

      {/* White canvas below — the band transition */}
      <div style={{ flex:1, background:T.canvas, overflowY:'auto' }}>
        <div style={{ padding:'16px 16px 0' }}>
          <div style={{ background:T.canvas, borderRadius:20, border:`1px solid ${T.hairline}`, overflow:'hidden' }}>
            {[
              { label:'Personal Rating', value:'9.5 / 10', mono:true },
              { label:'Time Logged',     value:'87h',       mono:true },
              { label:'Metacritic',      value:'96',        mono:true },
              { label:'Started',         value:'Jan 12, 2024', mono:false },
              { label:'Genre',           value:'Action RPG',   mono:false },
            ].map((row,i,arr) => (
              <div key={row.label} style={{ padding:'12px 14px', display:'flex', justifyContent:'space-between', alignItems:'center', borderBottom:i<arr.length-1?`1px solid ${T.hairlineSoft}`:'none' }}>
                <span style={{ color:T.body, fontSize:13, fontFamily:F }}>{row.label}</span>
                {row.mono
                  ? <Num v={row.value} size={13} color={T.ink}/>
                  : <span style={{ color:T.body, fontSize:13, fontFamily:F, fontWeight:500 }}>{row.value}</span>
                }
              </div>
            ))}
          </div>
        </div>

        <div style={{ padding:'14px 16px 0' }}>
          <Label>Notes</Label>
          <div style={{ background:T.surfaceSoft, borderRadius:16, padding:'12px 14px', border:`1px solid ${T.hairline}` }}>
            <p style={{ color:T.body, fontSize:13, fontFamily:F, lineHeight:1.65 }}>
              Absolute masterpiece. Open world feels genuinely earned. Every boss is a puzzle of positioning and patience.
            </p>
          </div>
        </div>

        {/* Coinbase Blue — the ONE blue on this screen, used confidently */}
        <div style={{ padding:'14px 16px 16px' }}>
          <div style={{ background:T.primary, borderRadius:100, padding:'14px', textAlign:'center' }}>
            <span style={{ color:T.canvas, fontSize:15, fontFamily:F, fontWeight:600, letterSpacing:'-0.1px' }}>Log Session</span>
          </div>
        </div>
      </div>

      <TabBar active="library"/>
    </div>
  );
}

/* ── Screen 4: Discover ── */
function DiscoverScreen() {
  return (
    <div style={{ height:'100%', display:'flex', flexDirection:'column', background:T.canvas }}>
      <div style={{ flex:1, overflowY:'auto' }}>

        <div style={{ padding:'16px 16px 10px' }}>
          <div style={{ color:T.ink, fontSize:28, fontFamily:F, fontWeight:400, letterSpacing:'-0.8px' }}>Discover</div>
        </div>

        <div style={{ padding:'0 16px 12px' }}>
          <SearchPill placeholder="Search 500,000+ games…"/>
        </div>

        <div style={{ padding:'0 16px 16px' }}>
          <FilterPills items={['New Releases','Top Rated','Action RPG','Indie','Strategy']} activeIdx={1}/>
        </div>

        <div style={{ padding:'0 16px 16px' }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:10 }}>
            <Label>Trending</Label>
            <span style={{ color:T.primary, fontSize:12, fontFamily:F, fontWeight:600, marginBottom:10 }}>See all</span>
          </div>
          <div style={{ background:T.canvas, borderRadius:20, border:`1px solid ${T.hairline}`, overflow:'hidden' }}>
            {GAMES.slice(0,5).map((g,i) => (
              <div key={g.id} style={{ padding:'10px 12px', display:'flex', alignItems:'center', gap:10, borderBottom:i<4?`1px solid ${T.hairlineSoft}`:'none' }}>
                <span style={{ color:T.mutedSoft, fontSize:11, fontFamily:MONO, width:14, textAlign:'center', flexShrink:0 }}>{i+1}</span>
                <Cover game={g} w={34} h={46} r={7}/>
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ color:T.ink, fontSize:13, fontFamily:F, fontWeight:500, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{g.title}</div>
                  <div style={{ color:T.body, fontSize:11, fontFamily:F, marginTop:1 }}>{g.dev} · {g.year}</div>
                </div>
                <div style={{ background:T.surfaceStrong, borderRadius:6, padding:'3px 7px', flexShrink:0 }}>
                  <Num v={g.meta} size={11} color={T.ink}/>
                </div>
              </div>
            ))}
          </div>
        </div>

      </div>
      <TabBar active="discover"/>
    </div>
  );
}

/* ── Screen 5: Profile ── */
function ProfileScreen() {
  const topRated = [...GAMES].filter(g => g.rating).sort((a,b) => b.rating - a.rating).slice(0,3);
  return (
    <div style={{ height:'100%', display:'flex', flexDirection:'column', background:T.canvas }}>
      <div style={{ flex:1, overflowY:'auto' }}>

        <div style={{ padding:'16px 16px 18px', display:'flex', alignItems:'center', gap:12 }}>
          <div style={{ width:48, height:48, borderRadius:9999, background:T.surfaceStrong, border:`1px solid ${T.hairline}`, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
            <IcUser/>
          </div>
          <div>
            <div style={{ color:T.ink, fontSize:18, fontFamily:F, fontWeight:400, letterSpacing:'-0.3px' }}>David</div>
            <div style={{ color:T.body, fontSize:12, fontFamily:F }}>@davidg · Since 2024</div>
          </div>
        </div>

        {/* Dark stats band */}
        <div style={{ background:T.surfaceDark, padding:'18px 16px 20px' }}>
          <div style={{ display:'flex', gap:20, marginBottom:16 }}>
            {[['342h','Total played'],['47','In library']].map(([val,lbl]) => (
              <div key={lbl}>
                <Num v={val} size={24} color={T.onDark} w={400}/>
                <div style={{ color:T.onDarkSoft, fontSize:10, fontFamily:F, marginTop:3 }}>{lbl}</div>
              </div>
            ))}
          </div>
          <div style={{ borderTop:'1px solid #1e2228', paddingTop:14, display:'flex', gap:16 }}>
            {[['23','Done',T.yellow],['3','Playing',T.up],['18','Backlog',T.mutedSoft],['4','Dropped',T.muted]].map(([val,lbl,col]) => (
              <div key={lbl}>
                <Num v={val} size={14} color={col}/>
                <div style={{ color:T.onDarkSoft, fontSize:10, fontFamily:F, marginTop:1 }}>{lbl}</div>
              </div>
            ))}
          </div>
        </div>

        <div style={{ padding:'16px 16px 0' }}>
          <Label>Top rated</Label>
          <div style={{ background:T.canvas, borderRadius:20, border:`1px solid ${T.hairline}`, overflow:'hidden' }}>
            {topRated.map((g,i,arr) => (
              <div key={g.id} style={{ padding:'10px 12px', display:'flex', alignItems:'center', gap:10, borderBottom:i<arr.length-1?`1px solid ${T.hairlineSoft}`:'none' }}>
                <Cover game={g} w={32} h={42} r={6}/>
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ color:T.ink, fontSize:13, fontFamily:F, fontWeight:500, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{g.title}</div>
                  <div style={{ color:T.body, fontSize:11, fontFamily:F, marginTop:1 }}>{g.time}h</div>
                </div>
                <Num v={g.rating.toFixed(1)} size={15} color={T.yellow}/>
              </div>
            ))}
          </div>
        </div>

        <div style={{ padding:'14px 16px 20px' }}>
          <div style={{ background:T.canvas, borderRadius:20, border:`1px solid ${T.hairline}`, overflow:'hidden' }}>
            {[['Import from Steam',false],['Share Profile',false],['Notifications',false],['Sign Out',true]].map(([item,danger],i,arr) => (
              <div key={item} style={{ padding:'13px 14px', display:'flex', justifyContent:'space-between', alignItems:'center', borderBottom:i<arr.length-1?`1px solid ${T.hairlineSoft}`:'none' }}>
                <span style={{ color:danger?T.down:T.ink, fontSize:14, fontFamily:F, fontWeight:danger?500:400 }}>{item}</span>
                {!danger && <Chevron/>}
              </div>
            ))}
          </div>
        </div>

      </div>
      <TabBar active="profile"/>
    </div>
  );
}

/* ── App ── */
function App() {
  const screens = [
    { label:'01 — Home',     dark:false, Screen:HomeScreen },
    { label:'02 — Library',  dark:false, Screen:LibraryScreen },
    { label:'03 — Detail',   dark:true,  Screen:DetailScreen },
    { label:'04 — Discover', dark:false, Screen:DiscoverScreen },
    { label:'05 — Profile',  dark:false, Screen:ProfileScreen },
  ];

  return (
    <div style={{ minHeight:'100vh', background:T.surfaceDark, padding:'56px 48px 72px' }}>

      <div style={{ marginBottom:48, maxWidth:600 }}>
        <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:18 }}>
          <div style={{ background:T.primary, borderRadius:100, padding:'4px 12px' }}>
            <span style={{ color:'#fff', fontSize:11, fontFamily:F, fontWeight:700, letterSpacing:'0.5px' }}>COINBASE</span>
          </div>
          <div style={{ color:T.onDarkSoft, fontSize:11, fontFamily:F, fontWeight:500, letterSpacing:'0.5px' }}>DESIGN SYSTEM — v2</div>
        </div>
        <div style={{ color:T.onDark, fontSize:44, fontFamily:F, fontWeight:400, letterSpacing:'-2px', lineHeight:1.0, marginBottom:14 }}>
          Goodgame
        </div>
        <div style={{ color:T.onDarkSoft, fontSize:14, fontFamily:F, lineHeight:1.65, maxWidth:480 }}>
          White canvas as the primary surface — no other game tracker does this. Dark band rotation for portfolio heroes. Inter weight 400 on display. One Coinbase Blue moment per screen, used scarcely. Numbers in JetBrains Mono.
        </div>
      </div>

      <div style={{ display:'flex', gap:28, alignItems:'flex-start', overflowX:'auto', paddingBottom:12 }}>
        {screens.map(({ label, dark, Screen }) => (
          <div key={label} style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:14, flexShrink:0 }}>
            <IosFrame darkMode={dark}>
              <Screen/>
            </IosFrame>
            <div style={{ color:'rgba(255,255,255,0.25)', fontSize:12, fontFamily:F, fontWeight:500, letterSpacing:'0.3px' }}>{label}</div>
          </div>
        ))}
      </div>

      {/* Token reference */}
      <div style={{ marginTop:52, display:'flex', gap:18, flexWrap:'wrap' }}>
        {[
          ['Canvas',        T.canvas,         `1px solid ${T.hairline}`],
          ['Surface Strong',T.surfaceStrong,  `1px solid ${T.hairline}`],
          ['Hairline',      T.hairline,       null],
          ['Ink',           T.ink,            null],
          ['Body',          T.body,           null],
          ['Muted',         T.muted,          null],
          ['Coinbase Blue', T.primary,        null],
          ['Semantic Up',   T.up,             null],
          ['Semantic Down', T.down,           null],
          ['Amber',         T.yellow,         null],
          ['Surface Dark',  T.surfaceDark,    '1px solid #252a30'],
          ['Dark Elevated', T.surfaceDarkElev,'1px solid #252a30'],
        ].map(([lbl,hex,border]) => (
          <div key={lbl} style={{ display:'flex', alignItems:'center', gap:7 }}>
            <div style={{ width:24, height:24, borderRadius:100, background:hex, border:border||'none', flexShrink:0 }}/>
            <div>
              <div style={{ color:T.onDark, fontSize:11, fontFamily:F, fontWeight:500 }}>{lbl}</div>
              <div style={{ color:T.onDarkSoft, fontSize:10, fontFamily:F }}>{hex}</div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>

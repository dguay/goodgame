<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GameLog — Coinbase Design</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0b0d; }
  ::-webkit-scrollbar { display: none; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

/* ── Coinbase Dark Design Tokens ── */
const CB = {
  bg:       '#0a0b0d',
  elevated: '#16181c',
  raised:   '#1f2328',
  border:   '#252a30',
  hairline: '#2a3038',
  text:     '#ffffff',
  textSub:  '#a8acb3',
  textMid:  '#6b7280',
  blue:     '#0052ff',
  up:       '#05b169',
  down:     '#cf202f',
  amber:    '#d4a017',
  muted:    '#4b5563',
};

/* Inter weight 400 for display is the most distinctive Coinbase choice */
const F    = 'Inter, -apple-system, sans-serif';
const MONO = '"JetBrains Mono", "Courier New", monospace';

const STATUS = {
  playing:        { label:'In Progress', color:CB.up,    bgKey:'#05b16915' },
  done:           { label:'Completed',   color:CB.amber, bgKey:'#d4a01715' },
  want_to_play:   { label:'Backlog',     color:CB.textSub,bgKey:'transparent' },
  did_not_finish: { label:'Dropped',     color:CB.muted, bgKey:'transparent' },
};

const GAMES = [
  { id:1, title:'Elden Ring',      dev:'FromSoftware',   year:2022, sid:1245620, status:'playing',        rating:9.5, time:87,  meta:96, change:'+0.3', fb:'linear-gradient(160deg,#3d2a08,#0a0b0d)' },
  { id:2, title:"Baldur's Gate 3", dev:'Larian Studios', year:2023, sid:1086940, status:'done',           rating:10,  time:124, meta:96, change:'+0.0', fb:'linear-gradient(160deg,#1a1040,#0a0b0d)' },
  { id:3, title:'Hades',           dev:'Supergiant',     year:2020, sid:1145360, status:'done',           rating:9.0, time:52,  meta:93, change:'-0.5', fb:'linear-gradient(160deg,#3d0d1f,#0a0b0d)' },
  { id:4, title:'Hollow Knight',   dev:'Team Cherry',    year:2017, sid:367520,  status:'did_not_finish', rating:7.0, time:18,  meta:87, change:'-1.0', fb:'linear-gradient(160deg,#0a0a2a,#0a0b0d)' },
  { id:5, title:'Cyberpunk 2077',  dev:'CD Projekt Red', year:2020, sid:1091500, status:'want_to_play',   rating:null,time:0,   meta:86, change:null,   fb:'linear-gradient(160deg,#0a1a30,#0a0b0d)' },
  { id:6, title:'God of War',      dev:'Santa Monica',   year:2018, sid:1593500, status:'done',           rating:9.2, time:34,  meta:94, change:'+1.2', fb:'linear-gradient(160deg,#3d1508,#0a0b0d)' },
];

/* ── Cover Images ── */
function Cover({ game, width='100%', height=160, radius=0, position='center top' }) {
  const [err, setErr] = React.useState(false);
  const src = `https://cdn.cloudflare.steamstatic.com/steam/apps/${game.sid}/library_600x900.jpg`;
  return (
    <div style={{ width, height, borderRadius:radius, overflow:'hidden', background:CB.elevated, flexShrink:0 }}>
      {!err
        ? <img src={src} alt={game.title} onError={() => setErr(true)}
            style={{ width:'100%', height:'100%', objectFit:'cover', objectPosition:position, display:'block' }} />
        : <div style={{ width:'100%', height:'100%', background:game.fb }} />
      }
    </div>
  );
}

function LandscapeCover({ game, width='100%', height=160 }) {
  const [err, setErr] = React.useState(false);
  const src = `https://cdn.cloudflare.steamstatic.com/steam/apps/${game.sid}/header.jpg`;
  return (
    <div style={{ width, height, overflow:'hidden', background:CB.elevated, flexShrink:0 }}>
      {!err
        ? <img src={src} alt={game.title} onError={() => setErr(true)}
            style={{ width:'100%', height:'100%', objectFit:'cover', display:'block' }} />
        : <div style={{ width:'100%', height:'100%', background:game.fb }} />
      }
    </div>
  );
}

/* ── Status Badge (restrained, text-based) ── */
function StatusTag({ status }) {
  const s = STATUS[status];
  return (
    <span style={{ color:s.color, fontSize:11, fontFamily:F, fontWeight:600 }}>
      {s.label}
    </span>
  );
}

/* ── Mono Number ── */
function Num({ children, size=14, color=CB.text }) {
  return <span style={{ fontFamily:MONO, fontSize:size, fontWeight:500, color, letterSpacing:'-0.3px' }}>{children}</span>;
}

/* ── Screen 1: Home (Portfolio) ── */
function HomeScreen() {
  const playing = GAMES.filter(g => g.status === 'playing');
  const completed = GAMES.filter(g => g.status === 'done').length;
  return (
    <div style={{ flex:1, overflowY:'auto', paddingBottom:24 }}>

      {/* Header */}
      <div style={{ padding:'20px 20px 24px' }}>
        <div style={{ color:CB.textSub, fontSize:13, fontFamily:F, fontWeight:400, marginBottom:6 }}>Your collection</div>
        {/* Inter 400 for display — the defining Coinbase choice */}
        <div style={{ color:CB.text, fontSize:38, fontFamily:F, fontWeight:400, letterSpacing:'-1.8px', lineHeight:1.0 }}>47 games</div>
      </div>

      {/* Portfolio summary card */}
      <div style={{ padding:'0 20px 20px' }}>
        <div style={{ background:CB.elevated, borderRadius:24, padding:'20px', border:`1px solid ${CB.border}` }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:18 }}>
            <div>
              <div style={{ color:CB.textSub, fontSize:11, fontFamily:F, fontWeight:500, letterSpacing:'0.3px', textTransform:'uppercase', marginBottom:6 }}>Hours logged</div>
              <Num size={28} color={CB.text}>342h</Num>
            </div>
            <div style={{ textAlign:'right' }}>
              <div style={{ color:CB.textSub, fontSize:11, fontFamily:F, fontWeight:500, letterSpacing:'0.3px', textTransform:'uppercase', marginBottom:6 }}>Completed</div>
              <Num size={28} color={CB.text}>{completed}</Num>
            </div>
          </div>
          <div style={{ borderTop:`1px solid ${CB.hairline}`, paddingTop:14, display:'flex', gap:16 }}>
            {[['In Progress','3',CB.up],['Backlog','18',CB.textSub],['Dropped','4',CB.muted]].map(([l,v,c]) => (
              <div key={l}>
                <div style={{ color:CB.textSub, fontSize:10, fontFamily:F, fontWeight:500 }}>{l}</div>
                <Num size={16} color={c}>{v}</Num>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* In Progress section */}
      <div style={{ padding:'0 20px 16px' }}>
        <div style={{ color:CB.textSub, fontSize:11, fontFamily:F, fontWeight:500, letterSpacing:'0.5px', textTransform:'uppercase', marginBottom:12 }}>In progress</div>
        {playing.map(g => (
          <div key={g.id} style={{ background:CB.elevated, borderRadius:20, overflow:'hidden', border:`1px solid ${CB.border}`, marginBottom:10 }}>
            <div style={{ position:'relative', height:140 }}>
              <LandscapeCover game={g} height={140} />
              <div style={{ position:'absolute', inset:0, background:'linear-gradient(to bottom, transparent 30%, rgba(22,24,28,0.97) 85%)' }} />
              <div style={{ position:'absolute', bottom:0, left:0, right:0, padding:'12px 14px', display:'flex', justifyContent:'space-between', alignItems:'flex-end' }}>
                <div>
                  <div style={{ color:CB.text, fontSize:14, fontFamily:F, fontWeight:600, letterSpacing:'-0.2px', marginBottom:2 }}>{g.title}</div>
                  <div style={{ display:'flex', alignItems:'center', gap:5 }}>
                    <div style={{ width:6, height:6, borderRadius:9999, background:CB.up }} />
                    <span style={{ color:CB.up, fontSize:10, fontFamily:F, fontWeight:600 }}>Playing</span>
                  </div>
                </div>
                <div>
                  <Num size={12} color={CB.textSub}>{g.time}h logged</Num>
                </div>
              </div>
            </div>
          </div>
        ))}
      </div>

      {/* Recent completions */}
      <div style={{ padding:'0 20px' }}>
        <div style={{ color:CB.textSub, fontSize:11, fontFamily:F, fontWeight:500, letterSpacing:'0.5px', textTransform:'uppercase', marginBottom:12 }}>Recent completions</div>
        <div style={{ background:CB.elevated, borderRadius:20, border:`1px solid ${CB.border}`, overflow:'hidden' }}>
          {GAMES.filter(g => g.status === 'done').slice(0,3).map((g,i,arr) => (
            <div key={g.id} style={{ padding:'12px 14px', display:'flex', alignItems:'center', gap:12, borderBottom: i<arr.length-1 ? `1px solid ${CB.hairline}` : 'none' }}>
              <Cover game={g} width={36} height={46} radius={8} />
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ color:CB.text, fontSize:13, fontFamily:F, fontWeight:500, letterSpacing:'-0.1px', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{g.title}</div>
                <div style={{ color:CB.textSub, fontSize:11, fontFamily:F, marginTop:2 }}>{g.time}h</div>
              </div>
              <Num size={14} color={CB.amber}>{g.rating?.toFixed(1)}</Num>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ── Screen 2: Library (Asset List) ── */
function LibraryScreen() {
  return (
    <div style={{ flex:1, overflowY:'auto', paddingBottom:24 }}>

      {/* Header */}
      <div style={{ padding:'20px 20px 8px', display:'flex', justifyContent:'space-between', alignItems:'baseline' }}>
        <div style={{ color:CB.text, fontSize:28, fontFamily:F, fontWeight:400, letterSpacing:'-1px' }}>Library</div>
        <span style={{ color:CB.blue, fontSize:13, fontFamily:F, fontWeight:600 }}>Sort</span>
      </div>

      {/* Search */}
      <div style={{ padding:'12px 20px 16px' }}>
        <div style={{ background:CB.raised, borderRadius:100, padding:'10px 16px', border:`1px solid ${CB.border}`, display:'flex', alignItems:'center', gap:8 }}>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke={CB.textSub} strokeWidth="2.5" strokeLinecap="round">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <span style={{ color:CB.textSub, fontSize:13, fontFamily:F, fontWeight:400 }}>Search…</span>
        </div>
      </div>

      {/* Asset rows — like a Coinbase holdings list */}
      <div style={{ padding:'0 20px' }}>
        <div style={{ background:CB.elevated, borderRadius:20, border:`1px solid ${CB.border}`, overflow:'hidden' }}>
          {GAMES.map((g,i) => (
            <div key={g.id} style={{
              padding:'12px 14px',
              display:'flex', alignItems:'center', gap:12,
              borderBottom: i<GAMES.length-1 ? `1px solid ${CB.hairline}` : 'none',
            }}>
              {/* Cover thumbnail */}
              <Cover game={g} width={38} height={50} radius={8} />

              {/* Game info */}
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ color:CB.text, fontSize:13, fontFamily:F, fontWeight:500, letterSpacing:'-0.1px', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis', marginBottom:3 }}>
                  {g.title}
                </div>
                <StatusTag status={g.status} />
              </div>

              {/* Right side: rating + playtime */}
              <div style={{ textAlign:'right', flexShrink:0 }}>
                {g.rating
                  ? <div style={{ marginBottom:2 }}><Num size={14} color={CB.text}>{g.rating.toFixed(1)}</Num></div>
                  : <div style={{ color:CB.muted, fontSize:11, fontFamily:F, marginBottom:2 }}>—</div>
                }
                {g.change
                  ? <Num size={11} color={parseFloat(g.change)>=0 ? CB.up : CB.down}>{g.change}</Num>
                  : null
                }
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ── Screen 3: Detail (Asset Detail) ── */
function DetailScreen() {
  const g = GAMES[0];
  return (
    <div style={{ flex:1, overflowY:'auto', paddingBottom:24 }}>

      {/* Full-bleed hero */}
      <div style={{ position:'relative', height:256 }}>
        <Cover game={g} width='100%' height={256} radius={0} position='center 15%' />
        <div style={{ position:'absolute', inset:0, background:'linear-gradient(to bottom, rgba(10,11,13,0.10) 0%, rgba(10,11,13,0.0) 15%, rgba(10,11,13,0.90) 70%, #0a0b0d 100%)' }} />
        <div style={{ position:'absolute', bottom:16, left:16, right:16 }}>
          {/* Title at Inter 400 — institutional calm */}
          <div style={{ color:CB.text, fontSize:22, fontFamily:F, fontWeight:400, letterSpacing:'-0.8px', lineHeight:1.1, marginBottom:6 }}>{g.title}</div>
          <div style={{ display:'flex', alignItems:'center', gap:8 }}>
            <div style={{ width:7, height:7, borderRadius:9999, background:CB.up }} />
            <span style={{ color:CB.up, fontSize:11, fontFamily:F, fontWeight:600 }}>In Progress</span>
            <span style={{ color:CB.hairline }}>·</span>
            <span style={{ color:CB.textSub, fontSize:11, fontFamily:F }}>FromSoftware</span>
          </div>
        </div>
      </div>

      {/* Key numbers — like Coinbase asset price stats */}
      <div style={{ padding:'16px 16px 0' }}>
        <div style={{ background:CB.elevated, borderRadius:20, border:`1px solid ${CB.border}`, overflow:'hidden' }}>
          {[
            { label:'Personal Rating', value:'9.5 / 10', mono:true, color:CB.text },
            { label:'Time Logged',     value:'87h',      mono:true, color:CB.text },
            { label:'Metacritic',      value:'96',       mono:true, color:CB.text },
            { label:'Started',         value:'Jan 12, 2024', mono:false, color:CB.textSub },
            { label:'Genre',           value:'Action RPG',  mono:false, color:CB.textSub },
          ].map((row,i,arr) => (
            <div key={row.label} style={{
              padding:'13px 16px',
              display:'flex', justifyContent:'space-between', alignItems:'center',
              borderBottom: i<arr.length-1 ? `1px solid ${CB.hairline}` : 'none',
            }}>
              <span style={{ color:CB.textSub, fontSize:13, fontFamily:F, fontWeight:400 }}>{row.label}</span>
              {row.mono
                ? <Num size={14} color={row.color}>{row.value}</Num>
                : <span style={{ color:row.color, fontSize:13, fontFamily:F, fontWeight:500 }}>{row.value}</span>
              }
            </div>
          ))}
        </div>
      </div>

      {/* Notes */}
      <div style={{ padding:'16px 16px 20px' }}>
        <div style={{ color:CB.textSub, fontSize:11, fontFamily:F, fontWeight:500, letterSpacing:'0.5px', textTransform:'uppercase', marginBottom:10 }}>Notes</div>
        <div style={{ background:CB.elevated, borderRadius:20, padding:'14px 16px', border:`1px solid ${CB.border}` }}>
          <p style={{ color:CB.textSub, fontSize:13, fontFamily:F, fontWeight:400, lineHeight:1.65 }}>
            Absolute masterpiece. Open world feels genuinely earned. Every boss is a puzzle of positioning and patience.
          </p>
        </div>
      </div>

      {/* Primary CTA — Coinbase Blue pill, scarce and confident */}
      <div style={{ padding:'0 16px' }}>
        <div style={{ background:CB.blue, borderRadius:100, padding:'15px', textAlign:'center' }}>
          <span style={{ color:'#fff', fontSize:15, fontFamily:F, fontWeight:600, letterSpacing:'-0.1px' }}>Edit Entry</span>
        </div>
      </div>
    </div>
  );
}

/* ── Nav Bar ── */
function NavBar({ active }) {
  const items = [
    { id:'home', label:'Home', icon:<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg> },
    { id:'lib',  label:'Library', icon:<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg> },
    { id:'search',label:'Discover', icon:<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg> },
    { id:'profile',label:'Profile', icon:<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><circle cx="12" cy="8" r="4"/><path d="M6 20v-2a6 6 0 0 1 12 0v2"/></svg> },
  ];
  return (
    <div style={{ height:68, background:CB.elevated, borderTop:`1px solid ${CB.border}`, display:'flex', alignItems:'center', paddingBottom:6 }}>
      {items.map(it => (
        <div key={it.id} style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:3, color: it.id===active ? CB.blue : CB.textSub }}>
          {it.icon}
          <span style={{ fontSize:10, fontFamily:F, fontWeight:500 }}>{it.label}</span>
        </div>
      ))}
    </div>
  );
}

/* ── iPhone Frame ── */
function Phone({ children, screen, label }) {
  const activeNav = { home:'home', library:'lib', detail:'lib' }[screen] || 'home';
  return (
    <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:20 }}>
      <div style={{
        width:390, height:844,
        background:CB.bg,
        borderRadius:54,
        overflow:'hidden',
        display:'flex',
        flexDirection:'column',
        outline:'1.5px solid #252a30',
      }}>
        {/* Status bar */}
        <div style={{ height:54, flexShrink:0, display:'flex', alignItems:'flex-end', padding:'0 30px 8px', position:'relative' }}>
          <div style={{ position:'absolute', top:12, left:'50%', transform:'translateX(-50%)', width:120, height:34, background:'#000', borderRadius:20, zIndex:10 }} />
          <div style={{ display:'flex', justifyContent:'space-between', width:'100%', zIndex:11 }}>
            <span style={{ color:CB.text, fontSize:12, fontFamily:F, fontWeight:600 }}>9:41</span>
            <div style={{ display:'flex', gap:5, alignItems:'center' }}>
              <svg width="15" height="11" viewBox="0 0 15 11" fill={CB.text}><rect x="0" y="4" width="3" height="7" rx="1"/><rect x="4" y="2.5" width="3" height="8.5" rx="1"/><rect x="8" y="1" width="3" height="10" rx="1"/><rect x="12" y="0" width="3" height="11" rx="1"/></svg>
              <svg width="15" height="11" viewBox="0 0 24 24" fill={CB.text}><path d="M1.5 8.5C5.5 4.5 18.5 4.5 22.5 8.5M5 12c3.5-3.5 11-3.5 14 0M8.5 15.5c2-2 5-2 7 0M12 19h.01"/></svg>
              <div style={{ width:24, height:12, border:`1.5px solid ${CB.text}`, borderRadius:3, display:'flex', alignItems:'center', padding:'1px 1px 1px 1.5px' }}>
                <div style={{ width:18, height:8, background:CB.text, borderRadius:1.5 }} />
                <div style={{ width:3, height:6, background:CB.text, borderRadius:'0 1px 1px 0', marginLeft:1 }} />
              </div>
            </div>
          </div>
        </div>

        <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden' }}>
          {children}
          <NavBar active={activeNav} />
        </div>

        <div style={{ height:8, display:'flex', justifyContent:'center', alignItems:'center', background:CB.bg }}>
          <div style={{ width:120, height:4, background:'rgba(255,255,255,0.18)', borderRadius:9999 }} />
        </div>
      </div>
      <div style={{ color:'rgba(255,255,255,0.3)', fontSize:13, fontFamily:F, fontWeight:500, letterSpacing:'0.3px' }}>{label}</div>
    </div>
  );
}

/* ── Page Layout ── */
function App() {
  return (
    <div style={{ minHeight:'100vh', background:CB.bg, padding:'64px 48px 80px' }}>

      {/* Header */}
      <div style={{ marginBottom:56, maxWidth:680 }}>
        <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:20 }}>
          <div style={{ background:CB.blue, borderRadius:100, padding:'5px 14px' }}>
            <span style={{ color:'#fff', fontSize:12, fontFamily:F, fontWeight:700, letterSpacing:'0.5px' }}>COINBASE</span>
          </div>
          <div style={{ color:CB.textSub, fontSize:12, fontFamily:F, fontWeight:500, letterSpacing:'0.5px' }}>DESIGN SYSTEM</div>
        </div>
        {/* Inter 400 at scale — the defining move */}
        <div style={{ color:CB.text, fontSize:48, fontFamily:F, fontWeight:400, letterSpacing:'-2px', lineHeight:1.0, marginBottom:16 }}>
          GameLog
        </div>
        <div style={{ color:CB.textSub, fontSize:15, fontFamily:F, fontWeight:400, lineHeight:1.65, maxWidth:520 }}>
          Near-black canvas. Inter at weight 400 for all display — institutional calm, not trading urgency. One blue accent, used once. Numbers in monospace. Generous editorial spacing. Coinbase Blue used exactly once per screen.
        </div>
      </div>

      {/* Phones */}
      <div style={{ display:'flex', gap:40, alignItems:'flex-start', overflowX:'auto' }}>
        <Phone screen="home"    label="01 — Home">    <HomeScreen />    </Phone>
        <Phone screen="library" label="02 — Library"> <LibraryScreen /> </Phone>
        <Phone screen="detail"  label="03 — Detail">  <DetailScreen />  </Phone>
      </div>

      {/* Token reference */}
      <div style={{ marginTop:64, display:'flex', gap:24, flexWrap:'wrap' }}>
        {[
          { label:'Background',     hex:'#0a0b0d', swatch:CB.bg },
          { label:'Elevated',       hex:'#16181c', swatch:CB.elevated },
          { label:'Raised',         hex:'#1f2328', swatch:CB.raised },
          { label:'Hairline',       hex:'#2a3038', swatch:CB.hairline },
          { label:'Text',           hex:'#ffffff', swatch:CB.text },
          { label:'Subdued',        hex:'#a8acb3', swatch:CB.textSub },
          { label:'Coinbase Blue',  hex:'#0052ff', swatch:CB.blue },
          { label:'Semantic Up',    hex:'#05b169', swatch:CB.up },
          { label:'Semantic Down',  hex:'#cf202f', swatch:CB.down },
          { label:'Amber',          hex:'#d4a017', swatch:CB.amber },
        ].map(t => (
          <div key={t.label} style={{ display:'flex', alignItems:'center', gap:8 }}>
            <div style={{ width:28, height:28, borderRadius:100, background:t.swatch, border:`1px solid ${CB.border}`, flexShrink:0 }} />
            <div>
              <div style={{ color:CB.text, fontSize:11, fontFamily:F, fontWeight:500 }}>{t.label}</div>
              <div style={{ color:CB.textSub, fontSize:10, fontFamily:F }}>{t.hex}</div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goodgame — Revolut Design</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #191c1f; }
  ::-webkit-scrollbar { display: none; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

/* ── Revolut Dark Design Tokens ── */
const RV = {
  bg:      '#0f1012',
  card:    '#191c1f',
  raised:  '#22262b',
  border:  '#2e333a',
  text:    '#ffffff',
  textSub: '#8d969e',
  textMid: '#c9c9cd',
  blue:    '#494fdf',
  teal:    '#00a87e',
  pink:    '#e61e49',
  yellow:  '#b09000',
  gray:    '#505a63',
};

const F = '"Plus Jakarta Sans", -apple-system, sans-serif';

const STATUS_COLORS = {
  playing:        '#00a87e',
  done:           '#b09000',
  want_to_play:   '#494fdf',
  did_not_finish: '#505a63',
};
const STATUS_LABELS = {
  playing:        'Playing',
  done:           'Done',
  want_to_play:   'Want to Play',
  did_not_finish: 'Did Not Finish',
};

const GAMES = [
  { id:1, title:'Elden Ring',      dev:'FromSoftware',   sid:1245620, status:'playing',        rating:9.5, time:87,  meta:96, fb:'linear-gradient(135deg,#3d2a08,#0f1012)' },
  { id:2, title:"Baldur's Gate 3", dev:'Larian Studios', sid:1086940, status:'done',           rating:10,  time:124, meta:96, fb:'linear-gradient(135deg,#1a1040,#0f1012)' },
  { id:3, title:'Hades',           dev:'Supergiant',     sid:1145360, status:'done',           rating:9.0, time:52,  meta:93, fb:'linear-gradient(135deg,#3d0d1f,#0f1012)' },
  { id:4, title:'Hollow Knight',   dev:'Team Cherry',    sid:367520,  status:'did_not_finish', rating:7.0, time:18,  meta:87, fb:'linear-gradient(135deg,#0a0a2a,#0f1012)' },
  { id:5, title:'Cyberpunk 2077',  dev:'CD Projekt Red', sid:1091500, status:'want_to_play',   rating:null,time:0,   meta:86, fb:'linear-gradient(135deg,#0a1a30,#0f1012)' },
  { id:6, title:'God of War',      dev:'Santa Monica',   sid:1593500, status:'done',           rating:9.2, time:34,  meta:94, fb:'linear-gradient(135deg,#3d1508,#0f1012)' },
];

/* ── Cover Image ── */
function Cover({ game, width='100%', height=160, radius=0, position='center top' }) {
  const [err, setErr] = React.useState(false);
  const src = `https://cdn.cloudflare.steamstatic.com/steam/apps/${game.sid}/library_600x900.jpg`;
  return (
    <div style={{ width, height, borderRadius:radius, overflow:'hidden', background:RV.card, flexShrink:0 }}>
      {!err
        ? <img src={src} alt={game.title} onError={() => setErr(true)}
            style={{ width:'100%', height:'100%', objectFit:'cover', objectPosition:position, display:'block' }} />
        : <div style={{ width:'100%', height:'100%', background:game.fb }} />
      }
    </div>
  );
}

function LandscapeCover({ game, width='100%', height=160 }) {
  const [err, setErr] = React.useState(false);
  const src = `https://cdn.cloudflare.steamstatic.com/steam/apps/${game.sid}/header.jpg`;
  return (
    <div style={{ width, height, overflow:'hidden', background:RV.card, flexShrink:0 }}>
      {!err
        ? <img src={src} alt={game.title} onError={() => setErr(true)}
            style={{ width:'100%', height:'100%', objectFit:'cover', display:'block' }} />
        : <div style={{ width:'100%', height:'100%', background:game.fb }} />
      }
    </div>
  );
}

/* ── Pill Status Badge ── */
function StatusPill({ status, small }) {
  const c = STATUS_COLORS[status];
  return (
    <div style={{
      display:'inline-flex', alignItems:'center',
      padding: small ? '2px 8px' : '4px 12px',
      borderRadius:9999,
      background:`${c}15`,
      border:`1px solid ${c}35`,
      color:c,
      fontSize: small ? 10 : 11,
      fontWeight:700,
      fontFamily:F,
      letterSpacing:'0.1px',
      whiteSpace:'nowrap',
    }}>
      {STATUS_LABELS[status]}
    </div>
  );
}

/* ── Section Label ── */
function SectionLabel({ text }) {
  return (
    <div style={{ color:RV.textSub, fontSize:11, fontFamily:F, fontWeight:700, letterSpacing:'1px', textTransform:'uppercase', marginBottom:12 }}>
      {text}
    </div>
  );
}

/* ── Screen 1: Home ── */
function HomeScreen() {
  const playing = GAMES.find(g => g.status === 'playing');
  const recent  = GAMES.filter(g => g !== playing).slice(0, 3);
  return (
    <div style={{ flex:1, overflowY:'auto', paddingBottom:24 }}>

      {/* Header */}
      <div style={{ padding:'20px 20px 16px', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
        <div>
          <div style={{ color:RV.textSub, fontSize:13, fontFamily:F, fontWeight:500 }}>Good evening</div>
          <div style={{ color:RV.text, fontSize:24, fontFamily:F, fontWeight:800, letterSpacing:'-0.6px', marginTop:2 }}>David</div>
        </div>
        <div style={{ width:38, height:38, borderRadius:9999, background:RV.blue, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
          <span style={{ color:'#fff', fontSize:15, fontWeight:800, fontFamily:F }}>D</span>
        </div>
      </div>

      {/* Stats row */}
      <div style={{ padding:'0 20px 20px', display:'flex', gap:8 }}>
        {[['47','Games'],['23','Finished'],['3','Playing']].map(([v,l]) => (
          <div key={l} style={{ flex:1, background:RV.card, borderRadius:14, padding:'12px 10px', border:`1px solid ${RV.border}` }}>
            <div style={{ color:RV.text, fontSize:20, fontFamily:F, fontWeight:800, letterSpacing:'-0.5px' }}>{v}</div>
            <div style={{ color:RV.textSub, fontSize:11, fontFamily:F, fontWeight:500, marginTop:2 }}>{l}</div>
          </div>
        ))}
      </div>

      {/* Continue Playing hero */}
      {playing && (
        <div style={{ padding:'0 20px 20px' }}>
          <SectionLabel text="Continue Playing" />
          <div style={{ borderRadius:18, overflow:'hidden', position:'relative', height:180 }}>
            <LandscapeCover game={playing} height={180} />
            <div style={{ position:'absolute', inset:0, background:'linear-gradient(to top, rgba(15,16,18,0.98) 30%, rgba(15,16,18,0.2) 80%)' }} />
            <div style={{ position:'absolute', bottom:0, left:0, right:0, padding:'14px 16px' }}>
              <div style={{ color:RV.text, fontSize:17, fontFamily:F, fontWeight:800, letterSpacing:'-0.4px', marginBottom:8 }}>{playing.title}</div>
              <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
                <div style={{ display:'flex', alignItems:'center', gap:6 }}>
                  <div style={{ width:6, height:6, borderRadius:9999, background:RV.teal }} />
                  <span style={{ color:RV.teal, fontSize:11, fontFamily:F, fontWeight:700 }}>Playing now</span>
                </div>
                <div style={{ background:RV.blue, borderRadius:9999, padding:'6px 14px' }}>
                  <span style={{ color:'#fff', fontSize:11, fontFamily:F, fontWeight:700 }}>Open</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* Recent */}
      <div style={{ padding:'0 20px' }}>
        <SectionLabel text="Recently Added" />
        <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
          {recent.map(g => (
            <div key={g.id} style={{ display:'flex', alignItems:'center', gap:12, background:RV.card, borderRadius:14, padding:'10px 12px', border:`1px solid ${RV.border}` }}>
              <Cover game={g} width={42} height={54} radius={8} />
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ color:RV.text, fontSize:13, fontFamily:F, fontWeight:700, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis', letterSpacing:'-0.1px' }}>{g.title}</div>
                <div style={{ color:RV.textSub, fontSize:11, fontFamily:F, marginTop:3 }}>{g.dev}</div>
              </div>
              <StatusPill status={g.status} small />
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ── Screen 2: Library ── */
function LibraryScreen() {
  return (
    <div style={{ flex:1, overflowY:'auto', paddingBottom:24 }}>

      {/* Header */}
      <div style={{ padding:'20px 20px 14px', display:'flex', justifyContent:'space-between', alignItems:'baseline' }}>
        <div style={{ color:RV.text, fontSize:24, fontFamily:F, fontWeight:800, letterSpacing:'-0.6px' }}>Library</div>
        <div style={{ color:RV.blue, fontSize:13, fontFamily:F, fontWeight:700 }}>Filter</div>
      </div>

      {/* Search pill */}
      <div style={{ padding:'0 20px 16px' }}>
        <div style={{ background:RV.card, borderRadius:9999, padding:'10px 16px', border:`1px solid ${RV.border}`, display:'flex', alignItems:'center', gap:8 }}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={RV.textSub} strokeWidth="2.5" strokeLinecap="round">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <span style={{ color:RV.textSub, fontSize:13, fontFamily:F, fontWeight:500 }}>Search your games…</span>
        </div>
      </div>

      {/* Status filter pills */}
      <div style={{ padding:'0 20px 16px', display:'flex', gap:6 }}>
        {['All','Playing','Done','Backlog'].map((l,i) => (
          <div key={l} style={{
            padding:'5px 12px', borderRadius:9999,
            background: i===0 ? RV.blue : RV.card,
            border:`1px solid ${i===0 ? RV.blue : RV.border}`,
            color: i===0 ? '#fff' : RV.textSub,
            fontSize:11, fontFamily:F, fontWeight:700,
          }}>
            {l}
          </div>
        ))}
      </div>

      {/* Grid */}
      <div style={{ padding:'0 20px', display:'grid', gridTemplateColumns:'1fr 1fr', gap:10 }}>
        {GAMES.map(g => (
          <div key={g.id} style={{ borderRadius:14, overflow:'hidden', background:RV.card, border:`1px solid ${RV.border}` }}>
            <div style={{ position:'relative' }}>
              <Cover game={g} width='100%' height={120} radius={0} />
              <div style={{ position:'absolute', top:8, right:8 }}>
                <div style={{ width:8, height:8, borderRadius:9999, background:STATUS_COLORS[g.status], boxShadow:`0 0 6px ${STATUS_COLORS[g.status]}80` }} />
              </div>
            </div>
            <div style={{ padding:'8px 10px 10px' }}>
              <div style={{ color:RV.text, fontSize:11, fontFamily:F, fontWeight:700, lineHeight:1.3, marginBottom:5, display:'-webkit-box', WebkitLineClamp:2, WebkitBoxOrient:'vertical', overflow:'hidden', letterSpacing:'-0.1px' }}>{g.title}</div>
              <div style={{ color:STATUS_COLORS[g.status], fontSize:10, fontFamily:F, fontWeight:700 }}>{STATUS_LABELS[g.status]}</div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ── Screen 3: Detail ── */
function DetailScreen() {
  const g = GAMES[0];
  return (
    <div style={{ flex:1, overflowY:'auto', paddingBottom:24 }}>

      {/* Hero cover */}
      <div style={{ position:'relative', height:240 }}>
        <Cover game={g} width='100%' height={240} radius={0} position='center 20%' />
        <div style={{ position:'absolute', inset:0, background:'linear-gradient(to bottom, rgba(15,16,18,0.15) 0%, rgba(15,16,18,0.0) 20%, rgba(15,16,18,0.92) 75%, #0f1012 100%)' }} />
        <div style={{ position:'absolute', bottom:16, left:16, right:16 }}>
          <div style={{ color:RV.text, fontSize:20, fontFamily:F, fontWeight:800, letterSpacing:'-0.5px', lineHeight:1.1, marginBottom:8 }}>{g.title}</div>
          <div style={{ display:'flex', alignItems:'center', gap:8 }}>
            <StatusPill status={g.status} />
            <span style={{ color:RV.textSub, fontSize:11, fontFamily:F }}>FromSoftware · 2022</span>
          </div>
        </div>
      </div>

      {/* Stats */}
      <div style={{ padding:'14px 16px', display:'flex', gap:8 }}>
        {[['9.5','Rating'],['87h','Playtime'],['96','Metacritic']].map(([v,l]) => (
          <div key={l} style={{ flex:1, background:RV.card, borderRadius:14, padding:'12px 8px', border:`1px solid ${RV.border}`, textAlign:'center' }}>
            <div style={{ color:RV.text, fontSize:18, fontFamily:F, fontWeight:800, letterSpacing:'-0.3px' }}>{v}</div>
            <div style={{ color:RV.textSub, fontSize:10, fontFamily:F, fontWeight:500, marginTop:2 }}>{l}</div>
          </div>
        ))}
      </div>

      {/* Notes */}
      <div style={{ padding:'0 16px 16px' }}>
        <SectionLabel text="My Notes" />
        <div style={{ background:RV.card, borderRadius:14, padding:'14px', border:`1px solid ${RV.border}` }}>
          <p style={{ color:RV.textMid, fontSize:12, fontFamily:F, fontWeight:500, lineHeight:1.65 }}>
            Absolute masterpiece. The open world feels genuinely earned. Every encounter is a puzzle of positioning and patience.
          </p>
        </div>
      </div>

      {/* Details row */}
      <div style={{ padding:'0 16px 20px' }}>
        <SectionLabel text="Details" />
        <div style={{ background:RV.card, borderRadius:14, border:`1px solid ${RV.border}`, overflow:'hidden' }}>
          {[['Genre','Action RPG'],['Release','February 2022'],['Developer','FromSoftware'],['Publisher','Bandai Namco']].map(([k,v],i,arr) => (
            <div key={k} style={{ padding:'11px 14px', display:'flex', justifyContent:'space-between', borderBottom: i<arr.length-1 ? `1px solid ${RV.border}` : 'none' }}>
              <span style={{ color:RV.textSub, fontSize:12, fontFamily:F, fontWeight:500 }}>{k}</span>
              <span style={{ color:RV.text, fontSize:12, fontFamily:F, fontWeight:700 }}>{v}</span>
            </div>
          ))}
        </div>
      </div>

      {/* CTA */}
      <div style={{ padding:'0 16px' }}>
        <div style={{ background:RV.blue, borderRadius:9999, padding:'14px', textAlign:'center' }}>
          <span style={{ color:'#fff', fontSize:15, fontFamily:F, fontWeight:800, letterSpacing:'-0.2px' }}>Edit Entry</span>
        </div>
      </div>
    </div>
  );
}

/* ── Nav Bar ── */
function NavBar({ active }) {
  const items = [
    { id:'home', label:'Home', icon:<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg> },
    { id:'lib',  label:'Library', icon:<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg> },
    { id:'search',label:'Search', icon:<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg> },
    { id:'profile',label:'Profile',icon:<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="8" r="4"/><path d="M6 20v-2a6 6 0 0 1 12 0v2"/></svg> },
  ];
  return (
    <div style={{ height:68, background:RV.card, borderTop:`1px solid ${RV.border}`, display:'flex', alignItems:'center', paddingBottom:6 }}>
      {items.map(it => (
        <div key={it.id} style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:3, color: it.id===active ? RV.blue : RV.textSub }}>
          {it.icon}
          <span style={{ fontSize:10, fontFamily:F, fontWeight:700 }}>{it.label}</span>
        </div>
      ))}
    </div>
  );
}

/* ── iPhone Frame ── */
function Phone({ children, screen, label }) {
  const activeNav = { home:'home', library:'lib', detail:'lib' }[screen] || 'home';
  return (
    <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:20 }}>
      <div style={{
        width:390, height:844,
        background:RV.bg,
        borderRadius:54,
        overflow:'hidden',
        position:'relative',
        display:'flex',
        flexDirection:'column',
        outline:'2px solid #2e333a',
      }}>
        {/* Status bar */}
        <div style={{ height:54, flexShrink:0, display:'flex', alignItems:'flex-end', padding:'0 30px 8px', position:'relative' }}>
          <div style={{ position:'absolute', top:12, left:'50%', transform:'translateX(-50%)', width:120, height:34, background:'#000', borderRadius:20, zIndex:10 }} />
          <div style={{ display:'flex', justifyContent:'space-between', width:'100%', zIndex:11 }}>
            <span style={{ color:RV.text, fontSize:12, fontFamily:F, fontWeight:700 }}>9:41</span>
            <div style={{ display:'flex', gap:5, alignItems:'center' }}>
              <svg width="15" height="11" viewBox="0 0 15 11" fill={RV.text}><rect x="0" y="4" width="3" height="7" rx="1"/><rect x="4" y="2.5" width="3" height="8.5" rx="1"/><rect x="8" y="1" width="3" height="10" rx="1"/><rect x="12" y="0" width="3" height="11" rx="1"/></svg>
              <svg width="15" height="11" viewBox="0 0 24 24" fill={RV.text}><path d="M1.5 8.5C5.5 4.5 18.5 4.5 22.5 8.5M5 12c3.5-3.5 11-3.5 14 0M8.5 15.5c2-2 5-2 7 0M12 19h.01"/></svg>
              <div style={{ width:24, height:12, border:`1.5px solid ${RV.text}`, borderRadius:3, display:'flex', alignItems:'center', padding:'1px 1px 1px 1.5px', gap:1 }}>
                <div style={{ width:18, height:8, background:RV.text, borderRadius:1.5 }} />
                <div style={{ width:3, height:6, background:RV.text, borderRadius:'0 1px 1px 0', marginLeft:1 }} />
              </div>
            </div>
          </div>
        </div>

        {/* Screen content */}
        <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden' }}>
          {children}
          <NavBar active={activeNav} />
        </div>

        {/* Home indicator */}
        <div style={{ height:8, display:'flex', justifyContent:'center', alignItems:'center', background:RV.bg }}>
          <div style={{ width:120, height:4, background:'rgba(255,255,255,0.25)', borderRadius:9999 }} />
        </div>
      </div>
      <div style={{ color:'rgba(255,255,255,0.35)', fontSize:13, fontFamily:F, fontWeight:600, letterSpacing:'0.5px' }}>{label}</div>
    </div>
  );
}

/* ── Page Layout ── */
function App() {
  return (
    <div style={{ minHeight:'100vh', background:'#191c1f', padding:'64px 48px 80px' }}>

      {/* Header */}
      <div style={{ marginBottom:56, maxWidth:680 }}>
        <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:20 }}>
          <div style={{ background:RV.blue, borderRadius:9999, padding:'5px 14px' }}>
            <span style={{ color:'#fff', fontSize:12, fontFamily:F, fontWeight:800, letterSpacing:'1px' }}>REVOLUT</span>
          </div>
          <div style={{ color:RV.textSub, fontSize:12, fontFamily:F, fontWeight:600, letterSpacing:'1px' }}>DESIGN SYSTEM</div>
        </div>
        <div style={{ color:RV.text, fontSize:48, fontFamily:F, fontWeight:800, letterSpacing:'-1.5px', lineHeight:1.05, marginBottom:16 }}>
          Goodgame
        </div>
        <div style={{ color:RV.textSub, fontSize:15, fontFamily:F, fontWeight:500, lineHeight:1.6, maxWidth:520 }}>
          Near-black canvas. Pill-everything. One blue accent. Plus Jakarta Sans at weight 800 — Aeonik Pro in spirit, geometric grotesque in execution. Zero shadows. Depth through contrast alone.
        </div>
      </div>

      {/* Phones */}
      <div style={{ display:'flex', gap:40, alignItems:'flex-start', overflowX:'auto' }}>
        <Phone screen="home"    label="01 — Home">    <HomeScreen />    </Phone>
        <Phone screen="library" label="02 — Library"> <LibraryScreen /> </Phone>
        <Phone screen="detail"  label="03 — Detail">  <DetailScreen />  </Phone>
      </div>

      {/* Token reference */}
      <div style={{ marginTop:64, display:'flex', gap:24, flexWrap:'wrap' }}>
        {[
          { label:'Background',  hex:'#0f1012', swatch:RV.bg },
          { label:'Card',        hex:'#191c1f', swatch:RV.card },
          { label:'Raised',      hex:'#22262b', swatch:RV.raised },
          { label:'Border',      hex:'#2e333a', swatch:RV.border },
          { label:'Text',        hex:'#ffffff', swatch:RV.text },
          { label:'Muted',       hex:'#8d969e', swatch:RV.textSub },
          { label:'Revolut Blue',hex:'#494fdf', swatch:RV.blue },
          { label:'Teal',        hex:'#00a87e', swatch:RV.teal },
        ].map(t => (
          <div key={t.label} style={{ display:'flex', alignItems:'center', gap:8 }}>
            <div style={{ width:28, height:28, borderRadius:9999, background:t.swatch, border:`1px solid ${RV.border}`, flexShrink:0 }} />
            <div>
              <div style={{ color:RV.text, fontSize:11, fontFamily:F, fontWeight:700 }}>{t.label}</div>
              <div style={{ color:RV.textSub, fontSize:10, fontFamily:F }}>{t.hex}</div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>

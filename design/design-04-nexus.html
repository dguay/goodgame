<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goodgame — Nexus Design</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #020409; font-family: 'Inter', sans-serif; }
  ::-webkit-scrollbar { display: none; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const NX = {
  void:       '#020409',
  base:       '#060810',
  surface:    '#0e1422',
  card:       '#131929',
  cardRaised: '#1c2840',
  border:     '#1e2d47',
  borderBr:   '#253047',
  cyan:       '#00d4ff',
  cyanDim:    '#007a94',
  cyanGlow:   'rgba(0,212,255,0.18)',
  purple:     '#7c3aed',
  purpleDim:  '#4c1d95',
  purpleGlow: 'rgba(124,58,237,0.18)',
  gold:       '#fbbf24',
  goldGlow:   'rgba(251,191,36,0.2)',
  neonGreen:  '#00ff88',
  white:      '#e8edf5',
  silver:     '#94a3b8',
  muted:      '#4e5d78',
  error:      '#f87171',
};

const nxGAMES = [
  { id:1, title:'Elden Ring', dev:'FromSoftware', year:2022, status:'playing', rating:9.2, playtime:47, cover:'linear-gradient(155deg,#3d2a08,#1a1205)', meta:94, genre:'RPG', level:12 },
  { id:2, title:'Hollow Knight', dev:'Team Cherry', year:2017, status:'done', rating:9.0, playtime:35, cover:'linear-gradient(155deg,#1a1040,#0a0820)', meta:87, genre:'Metroidvania', level:8 },
  { id:3, title:"Baldur's Gate 3", dev:'Larian Studios', year:2023, status:'playing', rating:null, playtime:12, cover:'linear-gradient(155deg,#400d0a,#1a0605)', meta:96, genre:'RPG', level:3 },
  { id:4, title:'Hades', dev:'Supergiant', year:2020, status:'done', rating:8.5, playtime:28, cover:'linear-gradient(155deg,#3d0d1f,#1a060f)', meta:93, genre:'Roguelite', level:6 },
  { id:5, title:'Cyberpunk 2077', dev:'CD Projekt Red', year:2020, status:'want_to_play', rating:null, playtime:0, cover:'linear-gradient(155deg,#0a1545,#050a20)', meta:86, genre:'RPG', level:0 },
  { id:6, title:'God of War', dev:'Santa Monica', year:2018, status:'did_not_finish', rating:7.0, playtime:8, cover:'linear-gradient(155deg,#3d1508,#1a0905)', meta:94, genre:'Action', level:2 },
];

const nxSTATUS = {
  playing:        { label:'ACTIVE',         color: NX.cyan,    icon:'▶' },
  done:           { label:'COMPLETED',      color: NX.gold,    icon:'✓' },
  want_to_play:   { label:'QUEUED',         color: NX.purple,  icon:'◈' },
  did_not_finish: { label:'ABANDONED',      color: NX.muted,   icon:'✕' },
};

function NxPhone({ children, label }) {
  return (
    <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:16 }}>
      <div style={{
        width:275, height:596,
        background:`linear-gradient(145deg, ${NX.cardRaised}, ${NX.surface})`,
        borderRadius:46, padding:11,
        boxShadow:`0 0 0 1px ${NX.border}, 0 40px 80px rgba(0,0,0,0.95), 0 0 60px ${NX.cyanGlow}`,
      }}>
        <div style={{ width:'100%', height:'100%', background:NX.base, borderRadius:36, overflow:'hidden', position:'relative' }}>
          {/* Scan line effect — very subtle */}
          <div style={{
            position:'absolute', inset:0, zIndex:1, pointerEvents:'none',
            backgroundImage:'repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,212,255,0.012) 3px, rgba(0,212,255,0.012) 4px)',
          }} />
          <div style={{ position:'absolute', top:10, left:'50%', transform:'translateX(-50%)', width:94, height:28, background:'#000', borderRadius:20, zIndex:10 }} />
          <div style={{ position:'absolute', top:0, left:0, right:0, height:50, display:'flex', alignItems:'flex-end', justifyContent:'space-between', paddingBottom:8, paddingLeft:22, paddingRight:22, zIndex:9 }}>
            <span style={{ fontSize:11, fontWeight:700, color:NX.cyan, fontFamily:'Rajdhani,sans-serif', letterSpacing:'1px' }}>9:41</span>
            <span style={{ fontSize:9, color:NX.muted }}>▲▲▲ ❋ ▮▮</span>
          </div>
          <div style={{ position:'absolute', top:50, left:0, right:0, bottom:22, overflowY:'auto', zIndex:2 }}>
            {children}
          </div>
          <div style={{ position:'absolute', bottom:7, left:'50%', transform:'translateX(-50%)', width:100, height:3, background:`linear-gradient(90deg,transparent,${NX.cyan},transparent)`, borderRadius:2, opacity:0.5, zIndex:11 }} />
        </div>
      </div>
      {label && <div style={{ color:NX.cyan, fontSize:11, letterSpacing:'0.2em', fontFamily:'Rajdhani,sans-serif', fontWeight:600, textTransform:'uppercase', opacity:0.7 }}>{label}</div>}
    </div>
  );
}

function NxBtn({ children, variant='primary', small, full }) {
  const base = {
    display:'inline-flex', alignItems:'center', justifyContent:'center', gap:5,
    borderRadius:4, cursor:'pointer', fontFamily:'Rajdhani,sans-serif',
    fontWeight:700, letterSpacing:'1.5px', textTransform:'uppercase',
    fontSize: small ? 10 : 12, padding: small ? '5px 12px' : '9px 20px',
    width: full ? '100%' : undefined, border:'none', position:'relative',
  };
  if (variant === 'primary') return (
    <div style={{ ...base, background:`linear-gradient(135deg,${NX.cyan},${NX.cyanDim})`, color:NX.void, boxShadow:`0 0 12px ${NX.cyanGlow}` }}>{children}</div>
  );
  if (variant === 'purple') return (
    <div style={{ ...base, background:`linear-gradient(135deg,${NX.purple},${NX.purpleDim})`, color:NX.white, boxShadow:`0 0 12px ${NX.purpleGlow}` }}>{children}</div>
  );
  if (variant === 'ghost') return (
    <div style={{ ...base, background:'transparent', color:NX.cyan, border:`1px solid ${NX.cyanDim}` }}>{children}</div>
  );
  return (
    <div style={{ ...base, background:NX.card, color:NX.silver, border:`1px solid ${NX.border}` }}>{children}</div>
  );
}

function NxCover({ game, width=110, height=148, radius=6 }) {
  return (
    <div style={{
      width, height, background:game.cover, borderRadius:radius,
      display:'flex', flexDirection:'column', justifyContent:'space-between',
      padding:6, position:'relative', overflow:'hidden', flexShrink:0,
    }}>
      <div style={{ position:'absolute', inset:0, background:'linear-gradient(to bottom, rgba(0,0,0,0.1), rgba(0,0,0,0.75))' }} />
      {/* Top: genre badge */}
      <div style={{ position:'relative', zIndex:1 }}>
        <span style={{ fontSize:7, fontWeight:700, color:NX.cyan, background:`${NX.cyanGlow}`, border:`1px solid ${NX.cyanDim}55`, borderRadius:2, padding:'2px 5px', fontFamily:'Rajdhani,sans-serif', letterSpacing:'0.8px', textTransform:'uppercase' }}>{game.genre}</span>
      </div>
      {/* Bottom: level */}
      {game.level > 0 && (
        <div style={{ position:'relative', zIndex:1 }}>
          <span style={{ fontSize:8, fontWeight:700, color:NX.gold, fontFamily:'Rajdhani,sans-serif', letterSpacing:'0.5px' }}>LVL {game.level}</span>
        </div>
      )}
    </div>
  );
}

function XpBar({ pct=65, color=NX.cyan }) {
  return (
    <div style={{ height:3, background:NX.border, borderRadius:2, position:'relative', overflow:'hidden' }}>
      <div style={{ position:'absolute', left:0, top:0, height:'100%', width:`${pct}%`, background:`linear-gradient(90deg,${color},${color}aa)`, borderRadius:2, boxShadow:`0 0 6px ${color}66` }} />
    </div>
  );
}

/* ─────────── NEXUS HOME ─────────── */
function NxHome() {
  return (
    <div style={{ background:NX.base, minHeight:'100%', paddingBottom:16 }}>
      {/* Header */}
      <div style={{ padding:'10px 14px 0', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
        <div>
          <div style={{ fontSize:9, fontWeight:600, color:NX.muted, letterSpacing:'2px', textTransform:'uppercase', fontFamily:'Rajdhani,sans-serif' }}>Welcome Back</div>
          <div style={{ fontSize:16, fontWeight:700, color:NX.white, letterSpacing:'1px', fontFamily:'Rajdhani,sans-serif', lineHeight:1 }}>DAVID</div>
        </div>
        <div style={{ display:'flex', gap:8, alignItems:'center' }}>
          {/* Rank badge */}
          <div style={{ background:NX.card, border:`1px solid ${NX.gold}44`, borderRadius:4, padding:'3px 8px', display:'flex', alignItems:'center', gap:4 }}>
            <div style={{ width:8, height:8, borderRadius:'50%', background:NX.gold, boxShadow:`0 0 6px ${NX.gold}` }} />
            <span style={{ fontSize:9, fontWeight:700, color:NX.gold, fontFamily:'Rajdhani,sans-serif', letterSpacing:'0.8px' }}>RANK 12</span>
          </div>
          <div style={{ width:28, height:28, borderRadius:'50%', background:`linear-gradient(135deg,${NX.cyan},${NX.cyanDim})`, display:'flex', alignItems:'center', justifyContent:'center', fontSize:12, fontWeight:700, color:NX.void, fontFamily:'Rajdhani,sans-serif', boxShadow:`0 0 10px ${NX.cyanGlow}` }}>D</div>
        </div>
      </div>

      {/* XP progress */}
      <div style={{ margin:'14px 14px 0', background:NX.card, border:`1px solid ${NX.border}`, borderRadius:6, padding:'10px 12px' }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:6 }}>
          <span style={{ fontSize:9, fontWeight:600, color:NX.muted, letterSpacing:'1.5px', textTransform:'uppercase', fontFamily:'Rajdhani,sans-serif' }}>Progress to Rank 13</span>
          <span style={{ fontSize:10, fontWeight:700, color:NX.cyan, fontFamily:'Rajdhani,sans-serif' }}>650 / 1000 XP</span>
        </div>
        <XpBar pct={65} color={NX.cyan} />
      </div>

      {/* Stat row */}
      <div style={{ margin:'10px 14px 0', display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:8 }}>
        {[['6','Games','cyan'], ['122h','Played','purple'], ['2','Active','neonGreen']].map(([n,l,col]) => (
          <div key={l} style={{ background:NX.card, border:`1px solid ${NX.border}`, borderRadius:4, padding:'10px 8px', position:'relative', overflow:'hidden' }}>
            <div style={{ position:'absolute', top:0, left:0, right:0, height:2, background:`linear-gradient(90deg,${NX[col] || NX.cyan},transparent)` }} />
            <div style={{ fontSize:22, fontWeight:700, color:NX[col] || NX.cyan, lineHeight:1, fontFamily:'Rajdhani,sans-serif', letterSpacing:'-0.5px' }}>{n}</div>
            <div style={{ fontSize:9, color:NX.muted, marginTop:3, fontWeight:600, letterSpacing:'0.8px', textTransform:'uppercase', fontFamily:'Rajdhani,sans-serif' }}>{l}</div>
          </div>
        ))}
      </div>

      {/* Active games */}
      <div style={{ margin:'16px 0 0' }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'0 14px', marginBottom:10 }}>
          <div style={{ fontSize:11, fontWeight:700, color:NX.white, letterSpacing:'2px', textTransform:'uppercase', fontFamily:'Rajdhani,sans-serif' }}>Active Sessions</div>
          <div style={{ fontSize:10, color:NX.cyan, fontWeight:600, fontFamily:'Rajdhani,sans-serif', letterSpacing:'1px' }}>VIEW ALL</div>
        </div>
        <div style={{ display:'flex', gap:10, paddingLeft:14, overflowX:'auto' }}>
          {nxGAMES.filter(g=>g.status==='playing').map(g => (
            <div key={g.id} style={{ flexShrink:0, width:108, background:NX.card, border:`1px solid ${NX.border}`, borderRadius:6, overflow:'hidden' }}>
              <NxCover game={g} width={108} height={138} radius={0} />
              <div style={{ padding:'8px 8px 10px' }}>
                <div style={{ fontSize:10, fontWeight:600, color:NX.white, lineHeight:1.3, marginBottom:4 }}>{g.title}</div>
                <XpBar pct={(g.playtime/50)*100} color={NX.cyan} />
                <div style={{ marginTop:4, fontSize:8, color:NX.cyan, fontFamily:'Rajdhani,sans-serif', fontWeight:700 }}>{g.playtime}h · LVL {g.level}</div>
              </div>
            </div>
          ))}
          <div style={{ width:14, flexShrink:0 }} />
        </div>
      </div>

      {/* Achievement unlocked toast */}
      <div style={{ margin:'14px', background:NX.card, border:`1px solid ${NX.gold}44`, borderRadius:6, padding:'10px 12px', display:'flex', gap:10, alignItems:'center' }}>
        <div style={{ width:32, height:32, borderRadius:4, background:`linear-gradient(135deg,${NX.gold},#b45309)`, display:'flex', alignItems:'center', justifyContent:'center', fontSize:16, flexShrink:0, boxShadow:`0 0 10px ${NX.goldGlow}` }}>🏆</div>
        <div>
          <div style={{ fontSize:9, fontWeight:600, color:NX.gold, letterSpacing:'1.5px', textTransform:'uppercase', fontFamily:'Rajdhani,sans-serif' }}>Achievement Unlocked</div>
          <div style={{ fontSize:11, fontWeight:700, color:NX.white, marginTop:1 }}>Dungeon Crawler</div>
          <div style={{ fontSize:9, color:NX.muted }}>Completed 10 RPG titles</div>
        </div>
        <div style={{ marginLeft:'auto', fontSize:12, fontWeight:700, color:NX.gold, fontFamily:'Rajdhani,sans-serif' }}>+50XP</div>
      </div>

      {/* Bottom nav */}
      <div style={{ margin:'4px 0 0', padding:'12px 20px 0', borderTop:`1px solid ${NX.border}`, display:'flex', justifyContent:'space-around' }}>
        {['⌂','⊕','▤','◉'].map((icon,i) => (
          <div key={i} style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:3 }}>
            <div style={{
              width:36, height:30, borderRadius:4,
              background: i===0 ? `${NX.cyanGlow}` : 'transparent',
              border: i===0 ? `1px solid ${NX.cyanDim}55` : '1px solid transparent',
              display:'flex', alignItems:'center', justifyContent:'center',
              fontSize:14, color: i===0 ? NX.cyan : NX.muted,
            }}>{icon}</div>
            <div style={{ fontSize:8, color: i===0 ? NX.cyan : NX.muted, fontWeight:700, letterSpacing:'1px', textTransform:'uppercase', fontFamily:'Rajdhani,sans-serif' }}>{['Home','Scout','Vault','Profile'][i]}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ─────────── NEXUS LIBRARY ─────────── */
function NxLibrary() {
  return (
    <div style={{ background:NX.base, minHeight:'100%', paddingBottom:80 }}>
      <div style={{ padding:'10px 14px 0', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
        <div>
          <div style={{ fontSize:9, color:NX.muted, letterSpacing:'2px', textTransform:'uppercase', fontFamily:'Rajdhani,sans-serif', fontWeight:600 }}>Your</div>
          <div style={{ fontSize:20, fontWeight:700, color:NX.white, letterSpacing:'2px', fontFamily:'Rajdhani,sans-serif', lineHeight:1 }}>VAULT</div>
        </div>
        <NxBtn variant="ghost" small>+ ADD</NxBtn>
      </div>

      {/* Status filter */}
      <div style={{ display:'flex', gap:6, padding:'14px 14px 0', overflowX:'auto' }}>
        {['ALL','ACTIVE','DONE','QUEUED','DNF'].map((f,i) => {
          const colors = [NX.cyan, NX.cyan, NX.gold, NX.purple, NX.muted];
          return (
            <div key={f} style={{
              flexShrink:0, padding:'5px 12px', borderRadius:4,
              background: i===0 ? NX.cyanGlow : 'transparent',
              border: `1px solid ${i===0 ? NX.cyanDim : NX.border}`,
              color: i===0 ? NX.cyan : NX.muted,
              fontSize:9, fontWeight:700, letterSpacing:'1.5px',
              cursor:'pointer', fontFamily:'Rajdhani,sans-serif',
            }}>{f}</div>
          );
        })}
      </div>

      {/* Game grid */}
      <div style={{ padding:'12px 14px 0', display:'grid', gridTemplateColumns:'1fr 1fr', gap:10 }}>
        {nxGAMES.map(g => {
          const s = nxSTATUS[g.status];
          return (
            <div key={g.id} style={{ background:NX.card, border:`1px solid ${NX.border}`, borderRadius:6, overflow:'hidden', position:'relative' }}>
              {/* Status accent line */}
              <div style={{ position:'absolute', top:0, left:0, right:0, height:2, background:`linear-gradient(90deg,${s.color},transparent)`, zIndex:2 }} />
              <NxCover game={g} width="100%" height={120} radius={0} />
              <div style={{ padding:'8px 8px 10px' }}>
                <div style={{ fontSize:10, fontWeight:600, color:NX.white, lineHeight:1.3, marginBottom:4 }}>{g.title}</div>
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                  <div style={{ display:'flex', alignItems:'center', gap:3 }}>
                    <div style={{ width:5, height:5, borderRadius:'50%', background:s.color, boxShadow:`0 0 4px ${s.color}` }} />
                    <span style={{ fontSize:8, fontWeight:700, color:s.color, letterSpacing:'0.8px', fontFamily:'Rajdhani,sans-serif' }}>{s.label}</span>
                  </div>
                  {g.rating && <span style={{ fontSize:11, fontWeight:700, color:NX.gold, fontFamily:'Rajdhani,sans-serif' }}>{g.rating}</span>}
                </div>
                {g.status === 'playing' && (
                  <div style={{ marginTop:6 }}><XpBar pct={(g.playtime/50)*100} color={NX.cyan} /></div>
                )}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ─────────── NEXUS DETAIL ─────────── */
function NxDetail() {
  const game = nxGAMES[0];
  return (
    <div style={{ background:NX.base, minHeight:'100%' }}>
      {/* Hero */}
      <div style={{ position:'relative', height:195 }}>
        <div style={{ position:'absolute', inset:0, background:game.cover, filter:'blur(22px)', transform:'scale(1.2)' }} />
        <div style={{ position:'absolute', inset:0, background:`linear-gradient(to bottom, rgba(6,8,16,0.3), rgba(6,8,16,0.98))` }} />
        {/* Scan lines on hero */}
        <div style={{ position:'absolute', inset:0, backgroundImage:'repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,212,255,0.02) 2px, rgba(0,212,255,0.02) 3px)', pointerEvents:'none' }} />
        <div style={{ position:'absolute', inset:0, display:'flex', alignItems:'flex-end', padding:14, gap:12 }}>
          <NxCover game={game} width={80} height={108} radius={4} />
          <div style={{ flex:1, paddingBottom:2 }}>
            <div style={{ fontSize:8, fontWeight:700, color:NX.cyan, letterSpacing:'2px', textTransform:'uppercase', fontFamily:'Rajdhani,sans-serif', marginBottom:3 }}>◈ {game.genre} · {game.year}</div>
            <div style={{ fontSize:21, fontWeight:700, color:NX.white, lineHeight:1.1, letterSpacing:'1px', fontFamily:'Rajdhani,sans-serif' }}>{game.title}</div>
            <div style={{ fontSize:10, color:NX.silver, marginTop:3 }}>{game.dev}</div>
            <div style={{ marginTop:8 }}>
              <XpBar pct={(game.playtime/50)*100} color={NX.cyan} />
              <div style={{ marginTop:3, fontSize:8, color:NX.cyan, fontFamily:'Rajdhani,sans-serif', fontWeight:700 }}>LVL {game.level} · {game.playtime}h played</div>
            </div>
          </div>
        </div>
      </div>

      {/* Stat panel */}
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', borderBottom:`1px solid ${NX.border}` }}>
        {[['9.2','Rating',NX.gold], ['47h','Played',NX.cyan], ['MC94','Score',NX.neonGreen]].map(([v,l,c], i) => (
          <div key={l} style={{ padding:'12px 0', textAlign:'center', borderRight: i<2 ? `1px solid ${NX.border}` : 'none', position:'relative', overflow:'hidden' }}>
            <div style={{ position:'absolute', top:0, left:0, right:0, height:2, background:c, opacity:0.5 }} />
            <div style={{ fontSize:20, fontWeight:700, color:c, letterSpacing:'-0.5px', fontFamily:'Rajdhani,sans-serif', lineHeight:1 }}>{v}</div>
            <div style={{ fontSize:8, color:NX.muted, fontWeight:700, marginTop:3, letterSpacing:'1.5px', textTransform:'uppercase', fontFamily:'Rajdhani,sans-serif' }}>{l}</div>
          </div>
        ))}
      </div>

      {/* Actions */}
      <div style={{ padding:'12px 14px 0', display:'flex', gap:8 }}>
        <div style={{ flex:1 }}><NxBtn variant="primary" full>▶ UPDATE STATUS</NxBtn></div>
        <NxBtn variant="dark">◈</NxBtn>
      </div>

      {/* Playthrough card */}
      <div style={{ margin:'12px 14px', background:NX.card, border:`1px solid ${NX.border}`, borderRadius:6, overflow:'hidden' }}>
        <div style={{ padding:'8px 12px', borderBottom:`1px solid ${NX.border}`, display:'flex', alignItems:'center', gap:6 }}>
          <div style={{ width:6, height:6, borderRadius:'50%', background:NX.cyan, boxShadow:`0 0 6px ${NX.cyan}` }} />
          <span style={{ fontSize:10, fontWeight:700, color:NX.white, letterSpacing:'1.5px', textTransform:'uppercase', fontFamily:'Rajdhani,sans-serif' }}>Active Playthrough</span>
          <div style={{ marginLeft:'auto', fontSize:8, color:NX.cyan, fontFamily:'Rajdhani,sans-serif', fontWeight:700 }}>PLAYING</div>
        </div>
        {[['Platform','PC, PS5'], ['Started','Jan 12, 2024'], ['Notes','Incredible open world, still exploring Farum Azula']].map(([k,v]) => (
          <div key={k} style={{ display:'flex', gap:8, padding:'8px 12px', borderBottom:`1px solid ${NX.border}`, alignItems:'flex-start' }}>
            <span style={{ fontSize:10, color:NX.muted, minWidth:55, fontFamily:'Rajdhani,sans-serif', fontWeight:600, letterSpacing:'0.5px' }}>{k}</span>
            <span style={{ fontSize:10, color:NX.silver, flex:1, lineHeight:1.4 }}>{v}</span>
          </div>
        ))}
      </div>

      {/* More */}
      <div style={{ padding:'0 14px 20px' }}>
        <div style={{ fontSize:10, fontWeight:700, color:NX.muted, letterSpacing:'2px', textTransform:'uppercase', fontFamily:'Rajdhani,sans-serif', marginBottom:10 }}>Similar Titles</div>
        <div style={{ display:'flex', gap:8, overflowX:'auto' }}>
          {nxGAMES.slice(1,5).map(g => (
            <div key={g.id} style={{ flexShrink:0, width:68, background:NX.card, border:`1px solid ${NX.border}`, borderRadius:4, overflow:'hidden' }}>
              <NxCover game={g} width={68} height={90} radius={0} />
              <div style={{ padding:'5px 5px 6px', fontSize:8, color:NX.silver, fontWeight:600, lineHeight:1.2 }}>{g.title.split(' ')[0]}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function App() {
  return (
    <div style={{
      minHeight:'100vh', background:NX.void,
      display:'flex', flexDirection:'column', alignItems:'center',

      <div style={{ textAlign:'center', maxWidth:700 }}>

        <h1 style={{ fontSize:42, fontWeight:700, color:NX.white, fontFamily:'Rajdhani,sans-serif', letterSpacing:'4px', lineHeight:1, textTransform:'uppercase' }}>

        </h1>
        <p style={{ marginTop:12, fontSize:14, color:NX.silver, fontWeight:400, lineHeight:1.6, maxWidth:520, margin:'12px auto 0', fontFamily:'Inter,sans-serif' }}>

        </p>
      </div>

      {/* Three phones */}
      <div style={{ display:'flex', gap:32, flexWrap:'wrap', justifyContent:'center' }}>

        <NxPhone label="Game Detail"><NxDetail /></NxPhone>
      </div>

      <div style={{ maxWidth:860, width:'100%', display:'grid', gridTemplateColumns:'1fr 1fr 1fr 1fr', gap:12 }}>

            <div style={{ fontSize:16, fontWeight:700, color:NX.cyan, marginBottom:4, fontFamily:'Rajdhani,sans-serif', letterSpacing:'1px', textShadow:`0 0 10px ${NX.cyanGlow}` }}>{val}</div>
            <div style={{ fontSize:12, fontWeight:600, color:NX.white, marginBottom:3 }}>{name}</div>

          </div>

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GameLog — PlayStation Design</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; font-family: 'Source Sans 3', 'Helvetica Neue', Arial, sans-serif; }
  ::-webkit-scrollbar { display: none; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const PS = {
  black: '#000000',
  surface: '#0d0d0d',
  card: '#161616',
  cardRaised: '#1e1e1e',
  blue: '#0070cc',
  blueDark: '#005ba6',
  cyan: '#1eaedb',
  white: '#ffffff',
  silver: '#cccccc',
  muted: '#888888',
  divider: '#2a2a2a',
  success: '#4ade80',
  warning: '#facc15',
  error: '#f87171',
  purple: '#7C6AF7',
};

const GAMES = [
  { id:1, title:'Elden Ring', dev:'FromSoftware', year:2022, status:'playing', rating:9.2, playtime:47, cover:'linear-gradient(155deg,#3d2a08,#1a1205,#0f0d04)', meta:94, genre:'RPG' },
  { id:2, title:'Hollow Knight', dev:'Team Cherry', year:2017, status:'done', rating:9.0, playtime:35, cover:'linear-gradient(155deg,#1a1040,#0a0820,#050415)', meta:87, genre:'Metroidvania' },
  { id:3, title:"Baldur's Gate 3", dev:'Larian Studios', year:2023, status:'playing', rating:null, playtime:12, cover:'linear-gradient(155deg,#400d0a,#1a0605,#0d0402)', meta:96, genre:'RPG' },
  { id:4, title:'Hades', dev:'Supergiant', year:2020, status:'done', rating:8.5, playtime:28, cover:'linear-gradient(155deg,#3d0d1f,#1a060f,#0d0408)', meta:93, genre:'Roguelite' },
  { id:5, title:'Cyberpunk 2077', dev:'CD Projekt Red', year:2020, status:'want_to_play', rating:null, playtime:0, cover:'linear-gradient(155deg,#0a1545,#050a20,#020510)', meta:86, genre:'RPG' },
  { id:6, title:'God of War', dev:'Santa Monica', year:2018, status:'did_not_finish', rating:7.0, playtime:8, cover:'linear-gradient(155deg,#3d1508,#1a0905,#0d0503)', meta:94, genre:'Action' },
];

const STATUS = {
  playing:        { label:'Playing',      color: PS.success  },
  done:           { label:'Done',         color: PS.warning  },
  want_to_play:   { label:'Want to Play', color: PS.blue     },
  did_not_finish: { label:'Did Not Finish', color: PS.muted  },
};

function Phone({ children, label, bg = PS.black }) {
  return (
    <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:16 }}>
      <div style={{
        width:275, height:596,
        background:'linear-gradient(145deg,#2a2a2a,#1a1a1a)',
        borderRadius:46,
        padding:11,
        boxShadow:'0 0 0 1px #3a3a3a, 0 40px 80px rgba(0,0,0,0.85), inset 0 1px 0 rgba(255,255,255,0.08)',
        position:'relative',
      }}>
        <div style={{
          width:'100%', height:'100%',
          background: bg,
          borderRadius:36, overflow:'hidden', position:'relative',
        }}>
          {/* Dynamic Island */}
          <div style={{
            position:'absolute', top:10, left:'50%', transform:'translateX(-50%)',
            width:94, height:28, background:'#000', borderRadius:20, zIndex:10,
          }} />
          {/* Status bar */}
          <div style={{
            position:'absolute', top:0, left:0, right:0, height:50,
            display:'flex', alignItems:'flex-end', justifyContent:'space-between',
            paddingBottom:8, paddingLeft:22, paddingRight:22, zIndex:9,
          }}>
            <span style={{ fontSize:11, fontWeight:600, color:PS.white, fontFamily:'Helvetica Neue,Arial' }}>9:41</span>
            <div style={{ display:'flex', gap:5, alignItems:'center', color:PS.white }}>
              <svg width="16" height="11" viewBox="0 0 16 11"><rect x="0" y="4" width="3" height="7" fill="white" rx="0.5"/><rect x="4.5" y="2.5" width="3" height="8.5" fill="white" rx="0.5"/><rect x="9" y="0.5" width="3" height="10.5" fill="white" rx="0.5"/><rect x="13.5" y="0" width="2.5" height="11" fill="rgba(255,255,255,0.3)" rx="0.5"/></svg>
              <svg width="15" height="11" viewBox="0 0 15 11"><path d="M7.5 2C9.8 2 11.9 2.9 13.4 4.4L15 2.8C13.1 1 10.4 0 7.5 0C4.6 0 1.9 1 0 2.8L1.6 4.4C3.1 2.9 5.2 2 7.5 2Z" fill="white"/><path d="M7.5 5C9.0 5 10.4 5.6 11.4 6.6L13 5C11.6 3.7 9.7 3 7.5 3C5.3 3 3.4 3.7 2 5L3.6 6.6C4.6 5.6 6.0 5 7.5 5Z" fill="white"/><circle cx="7.5" cy="10" r="1.5" fill="white"/></svg>
              <div style={{ width:22, height:11, border:'1px solid rgba(255,255,255,0.5)', borderRadius:2.5, padding:'1px 2px', display:'flex', alignItems:'center' }}>
                <div style={{ height:'100%', width:'75%', background:PS.white, borderRadius:1 }} />
              </div>
            </div>
          </div>
          {/* Content */}
          <div style={{ position:'absolute', top:50, left:0, right:0, bottom:22, overflowY:'auto' }}>
            {children}
          </div>
          {/* Home indicator */}
          <div style={{
            position:'absolute', bottom:7, left:'50%', transform:'translateX(-50%)',
            width:100, height:4, background:'rgba(255,255,255,0.4)', borderRadius:2,
          }} />
        </div>
      </div>
      {label && <div style={{ color:PS.muted, fontSize:12, letterSpacing:'0.1em', fontFamily:'Helvetica Neue,Arial', textTransform:'uppercase' }}>{label}</div>}
    </div>
  );
}

function PsBtn({ children, variant='primary', small }) {
  const base = {
    display:'inline-flex', alignItems:'center', justifyContent:'center',
    borderRadius:999, cursor:'pointer', fontFamily:'Source Sans 3,"Helvetica Neue",Arial',
    fontWeight:500, letterSpacing:'0.4px', border:'none', transition:'all 180ms ease',
    fontSize: small ? 12 : 14,
    padding: small ? '6px 14px' : '9px 20px',
  };
  if (variant === 'primary') return <div style={{ ...base, background:PS.blue, color:PS.white }}>{children}</div>;
  if (variant === 'ghost') return <div style={{ ...base, background:'transparent', border:`1px solid ${PS.divider}`, color:PS.silver }}>{children}</div>;
  return <div style={{ ...base, background:PS.card, color:PS.silver }}>{children}</div>;
}

function StatusBadge({ status, small }) {
  const s = STATUS[status];
  return (
    <div style={{
      display:'inline-flex', alignItems:'center', gap:4,
      border:`1px solid ${s.color}33`,
      background:`${s.color}12`,
      borderRadius:999, padding: small ? '2px 8px' : '3px 10px',
      color: s.color, fontSize: small ? 10 : 11, fontWeight:500,
      letterSpacing:'0.1px',
    }}>
      {s.label}
    </div>
  );
}

function CoverArt({ game, width=120, height=160, radius=12 }) {
  return (
    <div style={{
      width, height,
      background: game.cover,
      borderRadius: radius,
      display:'flex', flexDirection:'column',
      justifyContent:'flex-end', padding:8,
      position:'relative', overflow:'hidden', flexShrink:0,
    }}>
      <div style={{ position:'absolute', inset:0, background:'linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 50%)' }} />
      <div style={{ position:'relative', zIndex:1, fontSize:9, fontWeight:600, color:'rgba(255,255,255,0.9)', lineHeight:1.2 }}>{game.title}</div>
    </div>
  );
}

/* ─────────── HOME SCREEN ─────────── */
function PsHome() {
  return (
    <div style={{ background:PS.black, minHeight:'100%', paddingBottom:16 }}>
      {/* Nav bar */}
      <div style={{ background:PS.black, padding:'12px 16px 0', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
        <div style={{ fontSize:18, fontWeight:700, color:PS.white, letterSpacing:'0.5px' }}>GameLog</div>
        <div style={{ width:30, height:30, borderRadius:'50%', background:PS.card, display:'flex', alignItems:'center', justifyContent:'center' }}>
          <div style={{ width:16, height:16, borderRadius:'50%', background:`linear-gradient(135deg,${PS.blue},${PS.cyan})` }} />
        </div>
      </div>

      {/* Greeting */}
      <div style={{ padding:'20px 16px 0' }}>
        <div style={{ fontSize:11, color:PS.muted, fontWeight:500, letterSpacing:'0.5px', textTransform:'uppercase', marginBottom:6 }}>Good Evening</div>
        <div style={{ fontSize:28, fontWeight:300, color:PS.white, lineHeight:1.25, letterSpacing:'-0.1px' }}>Welcome back,{'\n'}David</div>
      </div>

      {/* Stats strip */}
      <div style={{ margin:'16px', display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:8 }}>
        {[['6','Total'], ['2','Playing'], ['2','Done']].map(([n,l]) => (
          <div key={l} style={{ background:PS.card, borderRadius:12, padding:'12px 8px', textAlign:'center', border:`1px solid ${PS.divider}` }}>
            <div style={{ fontSize:22, fontWeight:300, color:PS.blue, lineHeight:1 }}>{n}</div>
            <div style={{ fontSize:10, color:PS.muted, marginTop:4, fontWeight:500 }}>{l}</div>
          </div>
        ))}
      </div>

      {/* Section: Continue Playing */}
      <div style={{ marginTop:4 }}>
        <div style={{ padding:'0 16px 10px', display:'flex', justifyContent:'space-between', alignItems:'baseline' }}>
          <div style={{ fontSize:14, fontWeight:300, color:PS.white, letterSpacing:'0.1px' }}>Continue Playing</div>
          <div style={{ fontSize:11, color:PS.blue, fontWeight:500 }}>See all</div>
        </div>
        <div style={{ display:'flex', gap:10, paddingLeft:16, overflowX:'auto' }}>
          {GAMES.filter(g => g.status === 'playing').map(g => (
            <div key={g.id} style={{ flexShrink:0, width:110 }}>
              <CoverArt game={g} width={110} height={150} radius={12} />
              <div style={{ marginTop:6, fontSize:11, color:PS.silver, fontWeight:400, lineHeight:1.3 }}>{g.title}</div>
              <div style={{ marginTop:2, fontSize:10, color:PS.muted }}>{g.playtime}h played</div>
            </div>
          ))}
          <div style={{ width:16, flexShrink:0 }} />
        </div>
      </div>

      {/* Section: New Releases */}
      <div style={{ marginTop:20 }}>
        <div style={{ padding:'0 16px 10px', display:'flex', justifyContent:'space-between', alignItems:'baseline' }}>
          <div style={{ fontSize:14, fontWeight:300, color:PS.white, letterSpacing:'0.1px' }}>New Releases</div>
          <div style={{ fontSize:11, color:PS.blue, fontWeight:500 }}>Browse</div>
        </div>
        <div style={{ display:'flex', gap:10, paddingLeft:16, overflowX:'auto' }}>
          {GAMES.slice(2).map(g => (
            <div key={g.id} style={{ flexShrink:0, width:110 }}>
              <CoverArt game={g} width={110} height={150} radius={12} />
              <div style={{ marginTop:6, fontSize:11, color:PS.silver, fontWeight:400, lineHeight:1.3 }}>{g.title}</div>
              <div style={{ marginTop:3 }}><PsBtn variant="primary" small>+ Add</PsBtn></div>
            </div>
          ))}
          <div style={{ width:16, flexShrink:0 }} />
        </div>
      </div>

      {/* Bottom nav */}
      <div style={{ margin:'20px 16px 0', paddingTop:16, borderTop:`1px solid ${PS.divider}`, display:'flex', justifyContent:'space-around' }}>
        {['Home','Search','Library','Profile'].map((t,i) => (
          <div key={t} style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:3 }}>
            <div style={{ width:20, height:20, borderRadius:4, background: i===0 ? PS.blue : PS.card }} />
            <div style={{ fontSize:9, color: i===0 ? PS.blue : PS.muted, fontWeight: i===0 ? 600 : 400 }}>{t}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ─────────── LIBRARY SCREEN ─────────── */
function PsLibrary() {
  const filters = ['All','Playing','Done','Want','DNF'];
  return (
    <div style={{ background:PS.black, minHeight:'100%', paddingBottom:80 }}>
      <div style={{ padding:'12px 16px 0' }}>
        <div style={{ fontSize:22, fontWeight:300, color:PS.white, letterSpacing:'0.1px' }}>Library</div>
      </div>

      {/* Filter tabs */}
      <div style={{ display:'flex', gap:0, marginTop:14, borderBottom:`1px solid ${PS.divider}`, paddingLeft:12 }}>
        {filters.map((f,i) => (
          <div key={f} style={{
            padding:'8px 12px', fontSize:11, fontWeight: i===0 ? 600 : 400,
            color: i===0 ? PS.white : PS.muted,
            borderBottom: i===0 ? `2px solid ${PS.blue}` : '2px solid transparent',
            cursor:'pointer', whiteSpace:'nowrap',
          }}>{f}</div>
        ))}
      </div>

      {/* Sort/view controls */}
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'10px 16px' }}>
        <div style={{ fontSize:11, color:PS.muted }}>6 games</div>
        <div style={{ display:'flex', gap:6 }}>
          <PsBtn variant="ghost" small>Grid</PsBtn>
          <PsBtn variant="ghost" small>Recently Added</PsBtn>
        </div>
      </div>

      {/* Game grid */}
      <div style={{ padding:'0 12px', display:'grid', gridTemplateColumns:'1fr 1fr', gap:10 }}>
        {GAMES.map(g => (
          <div key={g.id} style={{ background:PS.card, borderRadius:16, overflow:'hidden', border:`1px solid ${PS.divider}` }}>
            <CoverArt game={g} width="100%" height={130} radius={0} />
            <div style={{ padding:'8px 10px 10px' }}>
              <div style={{ fontSize:11, fontWeight:500, color:PS.white, lineHeight:1.3, marginBottom:5 }}>{g.title}</div>
              <StatusBadge status={g.status} small />
              {g.rating && (
                <div style={{ marginTop:5, fontSize:10, color:PS.muted }}>
                  ★ {g.rating} · {g.playtime}h
                </div>
              )}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ─────────── GAME DETAIL SCREEN ─────────── */
function PsDetail() {
  const game = GAMES[0];
  return (
    <div style={{ background:PS.black, minHeight:'100%' }}>
      {/* Hero */}
      <div style={{ position:'relative', height:200 }}>
        <div style={{ position:'absolute', inset:0, background:game.cover, filter:'blur(20px)', transform:'scale(1.1)' }} />
        <div style={{ position:'absolute', inset:0, background:'linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(0,0,0,0.95))' }} />
        <div style={{ position:'absolute', inset:0, display:'flex', alignItems:'flex-end', padding:14, gap:12 }}>
          <CoverArt game={game} width={80} height={110} radius={10} />
          <div style={{ flex:1, paddingBottom:4 }}>
            <div style={{ fontSize:9, color:PS.cyan, fontWeight:600, letterSpacing:'0.5px', marginBottom:4, textTransform:'uppercase' }}>{game.genre}</div>
            <div style={{ fontSize:20, fontWeight:300, color:PS.white, lineHeight:1.2, letterSpacing:'-0.1px' }}>{game.title}</div>
            <div style={{ fontSize:11, color:PS.silver, marginTop:3 }}>{game.dev}</div>
            <div style={{ marginTop:6, display:'flex', gap:6, alignItems:'center' }}>
              <div style={{ background:`${PS.success}22`, border:`1px solid ${PS.success}55`, borderRadius:4, padding:'2px 6px', fontSize:10, color:PS.success, fontWeight:600 }}>MC {game.meta}</div>
              <div style={{ fontSize:10, color:PS.muted }}>★ {game.rating || 'Unrated'}</div>
            </div>
          </div>
        </div>
      </div>

      {/* Body */}
      <div style={{ padding:'16px 16px 0' }}>
        {/* Status + action */}
        <div style={{ display:'flex', gap:8, marginBottom:16 }}>
          <PsBtn variant="primary">Update Status</PsBtn>
          <PsBtn variant="ghost">Share</PsBtn>
        </div>

        {/* My Playthrough */}
        <div style={{ background:PS.card, borderRadius:16, padding:14, border:`1px solid ${PS.divider}`, marginBottom:12 }}>
          <div style={{ fontSize:12, fontWeight:300, color:PS.white, letterSpacing:'0.2px', marginBottom:12 }}>My Playthrough</div>
          {[['Status','Playing'], ['Playtime','47 hours'], ['Rating','9.2 / 10'], ['Started','Jan 12, 2024']].map(([k,v]) => (
            <div key={k} style={{ display:'flex', justifyContent:'space-between', paddingBottom:8, marginBottom:8, borderBottom:`1px solid ${PS.divider}` }}>
              <span style={{ fontSize:12, color:PS.muted }}>{k}</span>
              <span style={{ fontSize:12, color:PS.silver, fontWeight:500 }}>{v}</span>
            </div>
          ))}
        </div>

        {/* Description */}
        <div style={{ fontSize:13, fontWeight:300, color:PS.silver, lineHeight:1.6, marginBottom:16 }}>
          An open-world action RPG set in the Lands Between. Face challenging enemies, explore vast environments, and uncover the mysteries of a shattered world.
        </div>

        {/* More like this */}
        <div style={{ marginBottom:16 }}>
          <div style={{ fontSize:14, fontWeight:300, color:PS.white, marginBottom:10 }}>More Like This</div>
          <div style={{ display:'flex', gap:10, overflowX:'auto' }}>
            {GAMES.slice(1,4).map(g => (
              <div key={g.id} style={{ flexShrink:0 }}>
                <CoverArt game={g} width={75} height={100} radius={10} />
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Sticky bottom bar */}
      <div style={{ padding:'12px 16px', borderTop:`1px solid ${PS.divider}`, background:PS.surface, display:'flex', gap:10, alignItems:'center' }}>
        <div style={{ flex:1 }}>
          <div style={{ fontSize:12, fontWeight:500, color:PS.white, lineHeight:1.2 }}>{game.title}</div>
          <div style={{ fontSize:10, color:PS.muted }}>{game.dev}</div>
        </div>
        <PsBtn variant="primary">Playing ▸</PsBtn>
      </div>
    </div>
  );
}

function App() {
  return (
    <div style={{
      minHeight:'100vh',
      background:'#050505',
      display:'flex', flexDirection:'column', alignItems:'center',
      padding:'40px 24px 60px',
      gap:48,
    }}>
      {/* Header */}
      <div style={{ textAlign:'center', maxWidth:700 }}>
        <div style={{ display:'inline-block', background:`${PS.blue}22`, border:`1px solid ${PS.blue}44`, borderRadius:999, padding:'4px 16px', marginBottom:16 }}>
          <span style={{ fontSize:11, color:PS.blue, fontWeight:600, letterSpacing:'0.8px', textTransform:'uppercase', fontFamily:'Helvetica Neue,Arial' }}>Design Exploration · 01 of 04</span>
        </div>
        <h1 style={{ fontSize:36, fontWeight:300, color:PS.white, fontFamily:'Source Sans 3,"Helvetica Neue",Arial', letterSpacing:'-0.5px', lineHeight:1.2 }}>PlayStation Design System</h1>
        <p style={{ marginTop:12, fontSize:15, color:PS.muted, fontFamily:'Source Sans 3,"Helvetica Neue",Arial', fontWeight:400, lineHeight:1.6, maxWidth:520, margin:'12px auto 0' }}>
          Console Black canvas · SST weight 300 display type · PlayStation Blue #0070cc primary · Full-pill buttons · Quiet authority
        </p>
      </div>

      {/* Three phones */}
      <div style={{ display:'flex', gap:32, flexWrap:'wrap', justifyContent:'center' }}>
        <Phone label="Home" bg={PS.black}><PsHome /></Phone>
        <Phone label="Library" bg={PS.black}><PsLibrary /></Phone>
        <Phone label="Game Detail" bg={PS.black}><PsDetail /></Phone>
      </div>

      {/* Design notes */}
      <div style={{ maxWidth:860, width:'100%', display:'grid', gridTemplateColumns:'1fr 1fr 1fr 1fr', gap:12 }}>
        {[
          ['#0070cc', 'PlayStation Blue', 'Primary CTAs & brand anchor'],
          ['#1eaedb', 'PlayStation Cyan', 'Hover & focus states only'],
          ['weight 300', 'Display Voice', 'All headings 22px+ are thin'],
          ['999px', 'Pill Radius', 'Primary & CTA buttons'],
        ].map(([val, name, desc]) => (
          <div key={name} style={{ background:PS.card, border:`1px solid ${PS.divider}`, borderRadius:12, padding:14 }}>
            <div style={{ fontSize:18, fontWeight:300, color:PS.blue, marginBottom:4, fontFamily:'Helvetica Neue,Arial' }}>{val}</div>
            <div style={{ fontSize:12, fontWeight:600, color:PS.white, marginBottom:3 }}>{name}</div>
            <div style={{ fontSize:11, color:PS.muted, lineHeight:1.4 }}>{desc}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>

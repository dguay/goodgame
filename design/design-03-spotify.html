<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GameLog — Spotify Design</title>
<script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #080808; font-family: -apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif; }
  ::-webkit-scrollbar { display: none; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const SP = {
  base:       '#121212',
  surface:    '#181818',
  mid:        '#1f1f1f',
  darkCard:   '#252525',
  green:      '#1ed760',
  greenBdr:   '#1db954',
  white:      '#ffffff',
  silver:     '#b3b3b3',
  nearWhite:  '#cbcbcb',
  border:     '#4d4d4d',
  lightBdr:   '#7c7c7c',
  errorRed:   '#f3727f',
  warnOrng:   '#ffa42b',
  infBlue:    '#539df5',
};

const spGAMES = [
  { id:1, title:'Elden Ring', dev:'FromSoftware', year:2022, status:'playing', rating:9.2, playtime:47, cover:'linear-gradient(155deg,#4d3510,#1a1205,#0f0d04)', meta:94, genre:'RPG' },
  { id:2, title:'Hollow Knight', dev:'Team Cherry', year:2017, status:'done', rating:9.0, playtime:35, cover:'linear-gradient(155deg,#201555,#0a0820,#050415)', meta:87, genre:'Metroidvania' },
  { id:3, title:"Baldur's Gate 3", dev:'Larian Studios', year:2023, status:'playing', rating:null, playtime:12, cover:'linear-gradient(155deg,#5a1310,#1a0605,#0d0402)', meta:96, genre:'RPG' },
  { id:4, title:'Hades', dev:'Supergiant', year:2020, status:'done', rating:8.5, playtime:28, cover:'linear-gradient(155deg,#5a1030,#1a060f,#0d0408)', meta:93, genre:'Roguelite' },
  { id:5, title:'Cyberpunk 2077', dev:'CD Projekt Red', year:2020, status:'want_to_play', rating:null, playtime:0, cover:'linear-gradient(155deg,#101d60,#050a20,#020510)', meta:86, genre:'RPG' },
  { id:6, title:'God of War', dev:'Santa Monica', year:2018, status:'did_not_finish', rating:7.0, playtime:8, cover:'linear-gradient(155deg,#5a1e0c,#1a0905,#0d0503)', meta:94, genre:'Action' },
];

const spSTATUS = {
  playing:        { label:'PLAYING',       color: SP.green    },
  done:           { label:'DONE',          color: SP.silver   },
  want_to_play:   { label:'WANT TO PLAY',  color: SP.infBlue  },
  did_not_finish: { label:'DNF',           color: SP.errorRed },
};

function SpPhone({ children, label }) {
  return (
    <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:16 }}>
      <div style={{
        width:275, height:596,
        background:'linear-gradient(145deg,#222,#111)',
        borderRadius:46, padding:11,
        boxShadow:'0 0 0 1px #333, 0 40px 80px rgba(0,0,0,0.9), 0 0 0 8px rgba(30,215,96,0.03)',
      }}>
        <div style={{ width:'100%', height:'100%', background:SP.base, borderRadius:36, overflow:'hidden', position:'relative' }}>
          <div style={{ position:'absolute', top:10, left:'50%', transform:'translateX(-50%)', width:94, height:28, background:'#000', borderRadius:20, zIndex:10 }} />
          <div style={{ position:'absolute', top:0, left:0, right:0, height:50, display:'flex', alignItems:'flex-end', justifyContent:'space-between', paddingBottom:8, paddingLeft:22, paddingRight:22, zIndex:9 }}>
            <span style={{ fontSize:11, fontWeight:700, color:SP.white }}>9:41</span>
            <span style={{ fontSize:9, color:SP.silver }}>▲▲▲ ❋ ▮▮</span>
          </div>
          <div style={{ position:'absolute', top:50, left:0, right:0, bottom:22, overflowY:'auto' }}>
            {children}
          </div>
          <div style={{ position:'absolute', bottom:7, left:'50%', transform:'translateX(-50%)', width:100, height:4, background:'rgba(255,255,255,0.35)', borderRadius:2 }} />
        </div>
      </div>
      {label && <div style={{ color:'#555', fontSize:11, letterSpacing:'0.12em', textTransform:'uppercase', fontWeight:600 }}>{label}</div>}
    </div>
  );
}

function SpBtn({ children, variant='primary', small }) {
  const base = {
    display:'inline-flex', alignItems:'center', justifyContent:'center',
    borderRadius:9999, cursor:'pointer',
    fontWeight:700, textTransform:'uppercase', letterSpacing:'1.4px',
    fontSize: small ? 10 : 12, padding: small ? '6px 14px' : '10px 22px',
    border:'none',
  };
  if (variant === 'green') return <div style={{ ...base, background:SP.green, color:'#000' }}>{children}</div>;
  if (variant === 'outline') return <div style={{ ...base, background:'transparent', color:SP.white, border:`1px solid ${SP.lightBdr}` }}>{children}</div>;
  if (variant === 'dark') return <div style={{ ...base, background:SP.mid, color:SP.white, border:`1px solid ${SP.border}` }}>{children}</div>;
  return <div style={{ ...base, background:SP.white, color:'#000' }}>{children}</div>;
}

function SpCover({ game, width=110, height=110, radius=6 }) {
  return (
    <div style={{
      width, height, background:game.cover, borderRadius:radius,
      boxShadow:'rgba(0,0,0,0.3) 0 8px 8px',
      display:'flex', flexDirection:'column', justifyContent:'flex-end',
      padding:5, position:'relative', overflow:'hidden', flexShrink:0,
    }}>
      <div style={{ position:'absolute', inset:0, background:'linear-gradient(to top, rgba(0,0,0,0.65), transparent 50%)' }} />
      <div style={{ position:'relative', zIndex:1, fontSize:7, fontWeight:700, color:'rgba(255,255,255,0.8)', textTransform:'uppercase', letterSpacing:'0.5px' }}>{game.genre}</div>
    </div>
  );
}

function CirclePlay({ color=SP.green, size=36 }) {
  return (
    <div style={{
      width:size, height:size, borderRadius:'50%',
      background:color, display:'flex', alignItems:'center', justifyContent:'center',
      boxShadow:`0 4px 12px ${color}44`,
    }}>
      <div style={{ width:0, height:0, borderTop:`${size*0.22}px solid transparent`, borderBottom:`${size*0.22}px solid transparent`, borderLeft:`${size*0.35}px solid #000`, marginLeft:size*0.08 }} />
    </div>
  );
}

/* ─────────── SP HOME ─────────── */
function SpHome() {
  return (
    <div style={{ background:SP.base, minHeight:'100%', paddingBottom:16 }}>
      {/* Header */}
      <div style={{ padding:'10px 14px 0', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
        <div style={{ fontSize:14, fontWeight:700, color:SP.white }}>Good evening</div>
        <div style={{ width:28, height:28, borderRadius:'50%', background:`linear-gradient(135deg,${SP.green},#0fa037)`, display:'flex', alignItems:'center', justifyContent:'center', fontSize:12, fontWeight:700, color:'#000' }}>D</div>
      </div>

      {/* Quick picks grid — album-art-as-color philosophy */}
      <div style={{ padding:'14px 14px 0', display:'grid', gridTemplateColumns:'1fr 1fr', gap:8 }}>
        {spGAMES.slice(0,4).map(g => (
          <div key={g.id} style={{
            display:'flex', alignItems:'center', gap:0,
            background:SP.surface, borderRadius:6, overflow:'hidden',
            boxShadow:'rgba(0,0,0,0.3) 0 4px 4px',
          }}>
            <SpCover game={g} width={46} height={46} radius={0} />
            <div style={{ flex:1, paddingLeft:8, paddingRight:8 }}>
              <div style={{ fontSize:10, fontWeight:700, color:SP.white, lineHeight:1.25 }}>{g.title}</div>
            </div>
            {g.status === 'playing' && (
              <div style={{ paddingRight:8 }}><CirclePlay size={24} /></div>
            )}
          </div>
        ))}
      </div>

      {/* Continue Playing */}
      <div style={{ padding:'22px 14px 0' }}>
        <div style={{ fontSize:14, fontWeight:700, color:SP.white, marginBottom:12 }}>Continue Playing</div>
        <div style={{ display:'flex', gap:12, overflowX:'auto' }}>
          {spGAMES.filter(g=>g.status==='playing').map(g => (
            <div key={g.id} style={{ flexShrink:0, width:112 }}>
              <div style={{ position:'relative' }}>
                <SpCover game={g} width={112} height={112} radius={6} />
                <div style={{ position:'absolute', bottom:6, right:6 }}><CirclePlay size={28} /></div>
              </div>
              <div style={{ marginTop:6, fontSize:11, fontWeight:700, color:SP.white, lineHeight:1.3 }}>{g.title}</div>
              <div style={{ fontSize:10, color:SP.silver, marginTop:2 }}>{g.dev}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Discover section */}
      <div style={{ padding:'22px 14px 0' }}>
        <div style={{ fontSize:14, fontWeight:700, color:SP.white, marginBottom:12 }}>Your Game Mix</div>
        <div style={{ display:'flex', gap:12, overflowX:'auto' }}>
          {spGAMES.map(g => (
            <div key={g.id} style={{ flexShrink:0, width:112 }}>
              <SpCover game={g} width={112} height={112} radius={6} />
              <div style={{ marginTop:6, fontSize:11, fontWeight:700, color:SP.white, lineHeight:1.3 }}>{g.title}</div>
              <div style={{ fontSize:10, color:SP.silver, marginTop:2 }}>{g.dev}</div>
            </div>
          ))}
          <div style={{ width:14, flexShrink:0 }} />
        </div>
      </div>

      {/* Bottom nav */}
      <div style={{ margin:'22px 0 0', padding:'12px 0 0', borderTop:`1px solid ${SP.border}`, display:'flex', justifyContent:'space-around' }}>
        {['Home','Search','Library','Profile'].map((t,i) => (
          <div key={t} style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:4 }}>
            <div style={{ width:22, height:22, borderRadius: i===3 ? '50%' : 4, background: i===0 ? SP.green : SP.mid }} />
            <div style={{ fontSize:9, fontWeight:700, textTransform:'uppercase', letterSpacing:'1px', color: i===0 ? SP.white : SP.silver }}>{t}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ─────────── SP LIBRARY ─────────── */
function SpLibrary() {
  const filters = ['ALL','PLAYING','DONE','WANT TO PLAY','DNF'];
  return (
    <div style={{ background:SP.base, minHeight:'100%', paddingBottom:80 }}>
      <div style={{ padding:'10px 14px 0', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
        <div style={{ fontSize:16, fontWeight:700, color:SP.white }}>Your Library</div>
        <div style={{ width:28, height:28, borderRadius:'50%', background:SP.mid, display:'flex', alignItems:'center', justifyContent:'center' }}>
          <div style={{ fontSize:14, color:SP.white }}>+</div>
        </div>
      </div>

      {/* Pill filters — Spotify uppercase style */}
      <div style={{ display:'flex', gap:8, padding:'14px 14px 0', overflowX:'auto' }}>
        {filters.map((f,i) => (
          <div key={f} style={{
            flexShrink:0, padding:'6px 14px', borderRadius:9999,
            background: i===0 ? SP.white : SP.darkCard,
            color: i===0 ? '#000' : SP.silver,
            fontSize:10, fontWeight:700, letterSpacing:'1px',
            cursor:'pointer',
          }}>{f}</div>
        ))}
      </div>

      {/* List items */}
      <div style={{ padding:'14px 14px 0' }}>
        {spGAMES.map((g,i) => {
          const s = spSTATUS[g.status];
          return (
            <div key={g.id} style={{
              display:'flex', gap:12, padding:'10px 0',
              borderBottom: i<spGAMES.length-1 ? `1px solid rgba(255,255,255,0.05)` : 'none',
              alignItems:'center',
            }}>
              <SpCover game={g} width={50} height={50} radius={4} />
              <div style={{ flex:1, overflow:'hidden' }}>
                <div style={{ fontSize:12, fontWeight:700, color:SP.white, lineHeight:1.3, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{g.title}</div>
                <div style={{ fontSize:10, color:SP.silver, marginTop:1 }}>{g.dev}</div>
                <div style={{ marginTop:4, display:'inline-block', fontSize:8, fontWeight:700, color:s.color, letterSpacing:'1px', textTransform:'uppercase' }}>{s.label}</div>
              </div>
              {g.status === 'playing' && <CirclePlay size={30} />}
              <div style={{ width:16, height:16, display:'flex', flexDirection:'column', gap:2.5, justifyContent:'center' }}>
                {[0,1,2].map(j => <div key={j} style={{ width:14, height:1.5, background:SP.silver, borderRadius:1 }} />)}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ─────────── SP DETAIL ─────────── */
function SpDetail() {
  const game = spGAMES[0];
  return (
    <div style={{ background:SP.base, minHeight:'100%' }}>
      {/* Cover hero — album-art scale */}
      <div style={{ position:'relative', height:210 }}>
        <div style={{ position:'absolute', inset:0, background:game.cover, filter:'blur(30px)', transform:'scale(1.2)' }} />
        <div style={{ position:'absolute', inset:0, background:'linear-gradient(to bottom, rgba(0,0,0,0.1), rgba(18,18,18,0.95))' }} />
        <div style={{ position:'absolute', top:14, left:14 }}>
          <div style={{ width:28, height:28, borderRadius:'50%', background:'rgba(0,0,0,0.6)', display:'flex', alignItems:'center', justifyContent:'center' }}>
            <div style={{ width:0, height:0, borderTop:'5px solid transparent', borderBottom:'5px solid transparent', borderRight:`8px solid ${SP.white}`, marginRight:1 }} />
          </div>
        </div>
        <div style={{ position:'absolute', bottom:0, left:0, right:0, padding:14 }}>
          <SpCover game={game} width={100} height={100} radius={4} />
          <div style={{ marginTop:10 }}>
            <div style={{ fontSize:20, fontWeight:700, color:SP.white, lineHeight:1.2 }}>{game.title}</div>
            <div style={{ fontSize:12, color:SP.silver, marginTop:3 }}>{game.dev}</div>
          </div>
        </div>
      </div>

      {/* Controls */}
      <div style={{ padding:'14px', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
        <div style={{ display:'flex', gap:12, alignItems:'center' }}>
          <div style={{ fontSize:20, color:SP.silver }}>♡</div>
          <div style={{ fontSize:20, color:SP.silver }}>⋯</div>
        </div>
        <CirclePlay size={52} />
        <div style={{ display:'flex', gap:12, alignItems:'center' }}>
          <div style={{ fontSize:20, color:SP.silver }}>⇄</div>
          <div style={{ fontSize:20, color:SP.green }}>↺</div>
        </div>
      </div>

      {/* Status bar */}
      <div style={{ padding:'0 14px' }}>
        <div style={{ height:3, background:SP.border, borderRadius:2, position:'relative' }}>
          <div style={{ position:'absolute', left:0, top:0, height:'100%', width:'55%', background:SP.white, borderRadius:2 }} />
          <div style={{ position:'absolute', left:'55%', top:-2, width:7, height:7, borderRadius:'50%', background:SP.white, transform:'translateX(-50%)' }} />
        </div>
        <div style={{ display:'flex', justifyContent:'space-between', marginTop:5 }}>
          <span style={{ fontSize:10, color:SP.silver }}>47h played</span>
          <span style={{ fontSize:10, color:SP.silver }}>— total</span>
        </div>
      </div>

      {/* My stats */}
      <div style={{ margin:'14px', background:SP.surface, borderRadius:8, padding:14, boxShadow:'rgba(0,0,0,0.3) 0 8px 8px' }}>
        <div style={{ fontSize:12, fontWeight:700, color:SP.white, textTransform:'uppercase', letterSpacing:'1.4px', marginBottom:12 }}>Playthrough</div>
        {[['Status','Playing',SP.green],['Rating','9.2 / 10',SP.white],['Metacritic','94',SP.white],['Genre','Action RPG',SP.silver]].map(([k,v,c]) => (
          <div key={k} style={{ display:'flex', justifyContent:'space-between', padding:'7px 0', borderBottom:'1px solid rgba(255,255,255,0.06)' }}>
            <span style={{ fontSize:11, color:SP.silver }}>{k}</span>
            <span style={{ fontSize:11, fontWeight:700, color:c }}>{v}</span>
          </div>
        ))}
      </div>

      {/* More */}
      <div style={{ padding:'0 14px 20px' }}>
        <div style={{ fontSize:12, fontWeight:700, color:SP.white, textTransform:'uppercase', letterSpacing:'1.4px', marginBottom:12 }}>More Like This</div>
        <div style={{ display:'flex', gap:12, overflowX:'auto' }}>
          {spGAMES.slice(1,4).map(g => (
            <div key={g.id} style={{ flexShrink:0, width:80 }}>
              <SpCover game={g} width={80} height={80} radius={6} />
              <div style={{ marginTop:5, fontSize:9, fontWeight:700, color:SP.white, lineHeight:1.3 }}>{g.title}</div>
              <div style={{ fontSize:9, color:SP.silver, marginTop:1 }}>{g.dev}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function App() {
  return (
    <div style={{
      minHeight:'100vh', background:'#080808',
      display:'flex', flexDirection:'column', alignItems:'center',
      padding:'40px 24px 60px', gap:48,
    }}>
      <div style={{ textAlign:'center', maxWidth:700 }}>
        <div style={{ display:'inline-block', background:`${SP.green}18`, border:`1px solid ${SP.green}44`, borderRadius:9999, padding:'4px 18px', marginBottom:16 }}>
          <span style={{ fontSize:11, color:SP.green, fontWeight:700, letterSpacing:'1.4px', textTransform:'uppercase' }}>Design Exploration · 03 of 04</span>
        </div>
        <h1 style={{ fontSize:36, fontWeight:700, color:SP.white, letterSpacing:'-1px', lineHeight:1.1 }}>Spotify Design System</h1>
        <p style={{ marginTop:12, fontSize:15, color:SP.silver, fontWeight:400, lineHeight:1.6, maxWidth:520, margin:'12px auto 0' }}>
          Near-black dark immersion · Spotify Green #1ed760 functional only · Full-pill buttons · Uppercase + wide tracking · Game covers are the color
        </p>
      </div>

      <div style={{ display:'flex', gap:32, flexWrap:'wrap', justifyContent:'center' }}>
        <SpPhone label="Home"><SpHome /></SpPhone>
        <SpPhone label="Library"><SpLibrary /></SpPhone>
        <SpPhone label="Game Detail"><SpDetail /></SpPhone>
      </div>

      <div style={{ maxWidth:860, width:'100%', display:'grid', gridTemplateColumns:'1fr 1fr 1fr 1fr', gap:12 }}>
        {[
          ['#1ed760', 'Spotify Green', 'Play & active states only'],
          ['#121212', 'Near Black', 'Content-first darkness'],
          ['1.4–2px', 'Letter Spacing', 'Uppercase button labels'],
          ['9999px', 'Full Pill', 'All buttons are pill-shaped'],
        ].map(([val, name, desc]) => (
          <div key={name} style={{ background:SP.surface, border:`1px solid ${SP.border}`, borderRadius:8, padding:14 }}>
            <div style={{ fontSize:16, fontWeight:700, color:SP.green, marginBottom:4 }}>{val}</div>
            <div style={{ fontSize:12, fontWeight:700, color:SP.white, marginBottom:3 }}>{name}</div>
            <div style={{ fontSize:11, color:SP.silver, lineHeight:1.4 }}>{desc}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
